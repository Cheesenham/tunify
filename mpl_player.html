<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL Web Player v2.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --accent-color: #007bff;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .controls-top {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #f8f9fa;
        }

        #fileInput {
            display: none;
        }

        .player-container {
            flex: 1;
            width: 100%;
            max-width: 1000px;
            position: relative;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        video, audio {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .lyric-overlay {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 1.8rem;
            font-weight: bold;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        #lyricTop { top: 10%; }
        #lyricCenter { top: 50%; transform: translate(-50%, -50%); }
        #lyricBottom { bottom: 10%; }

        .playback-controls {
            width: 100%;
            max-width: 1000px;
            padding: 10px 20px 30px;
            box-sizing: border-box;
            background: white;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .seek-bar {
            width: 100%;
            cursor: pointer;
            height: 6px;
            accent-color: var(--accent-color);
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #666;
        }

        #trackInfo {
            font-size: 1rem;
            color: #333;
            text-align: center;
            margin-bottom: 5px;
        }

        /* Loading Spinner */
        #loader {
            display: none;
            position: absolute;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">MPL Web Player <span style="font-size: 0.8rem; color: #999;">v2.3</span></div>
        <div class="controls-top">
            <button onclick="document.getElementById('fileInput').click()">📁 .MPL 파일 열기</button>
            <input type="file" id="fileInput" accept=".mpl" onchange="handleFile(event)">
        </div>
    </header>

    <div id="trackInfo">파일을 선택해 주세요</div>

    <div class="player-container">
        <video id="mainPlayer" style="display:none"></video>
        <audio id="audioPlayer" style="display:none"></audio>
        
        <div id="lyricTop" class="lyric-overlay"></div>
        <div id="lyricCenter" class="lyric-overlay"></div>
        <div id="lyricBottom" class="lyric-overlay"></div>
        
        <div id="loader">가져오는 중...</div>
    </div>

    <div class="playback-controls">
        <input type="range" id="seekBar" class="seek-bar" value="0" step="0.1">
        <div class="time-info">
            <span id="currentTime">00:00</span>
            <div style="display:flex; gap: 15px;">
                <button id="playPauseBtn" style="border:none; font-size: 1.2rem;">▶</button>
            </div>
            <span id="duration">00:00</span>
        </div>
    </div>

    <script>
        const videoPlayer = document.getElementById('mainPlayer');
        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const seekBar = document.getElementById('seekBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const trackInfoEl = document.getElementById('trackInfo');
        
        let currentPlayer = videoPlayer;
        let lyrics = [];
        let isSeeking = false;

        async function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('loader').style.display = 'block';
            trackInfoEl.innerText = "처리 중...";

            try {
                const zip = await JSZip.loadAsync(file);
                let mediaFile, lrcText, metadata;

                // Scan files in ZIP
                for (let filename in zip.files) {
                    if (filename.startsWith('media.')) {
                        mediaFile = zip.files[filename];
                    } else if (filename.endsWith('.lrc')) {
                        lrcText = await zip.files[filename].async('string');
                    } else if (filename === 'metadata.json') {
                        metadata = JSON.parse(await zip.files[filename].async('string'));
                    }
                }

                if (!mediaFile) throw new Error("미디어 파일을 찾을 수 없습니다.");

                // 1. Setup Metadata
                if (metadata) {
                    trackInfoEl.innerText = `${metadata.artist || 'Unknown'} - ${metadata.title || 'Unknown'}`;
                }

                // 2. Setup Lyrics
                parseLyrics(lrcText || "");

                // 3. Setup Media
                const blob = await mediaFile.async('blob');
                const url = URL.createObjectURL(blob);

                // Decide player type (audio vs video)
                const isVideo = metadata && metadata.type === 'video';
                setupPlayer(url, isVideo);

            } catch (err) {
                alert("오류: " + err.message);
                trackInfoEl.innerText = "파일 로드 실패";
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function setupPlayer(url, isVideo) {
            // Stop old players
            videoPlayer.pause();
            audioPlayer.pause();
            videoPlayer.style.display = 'none';
            audioPlayer.style.display = 'none';

            currentPlayer = isVideo ? videoPlayer : audioPlayer;
            currentPlayer.src = url;
            currentPlayer.style.display = 'block';
            currentPlayer.play();
            playPauseBtn.innerText = "⏸";
        }

        function parseLyrics(text) {
            lyrics = [];
            const lines = text.split('\n');
            const pattern = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/;

            lines.forEach(line => {
                const match = pattern.exec(line);
                if (match) {
                    const mins = parseInt(match[1]);
                    const secs = parseInt(match[2]);
                    const msStr = match[3];
                    const ms = parseInt(msStr) * (msStr.length === 2 ? 10 : 1);
                    const time = (mins * 60 + secs) * 1000 + ms;
                    
                    let content = match[4].trim();
                    let pos = "Center";
                    const posMatch = /<pos:(Top|Center|Bottom)>/.exec(content);
                    if (posMatch) {
                        pos = posMatch[1];
                        content = content.replace(posMatch[0], "").trim();
                    }
                    
                    if (content) lyrics.push({ time, text: content, pos });
                }
            });
            lyrics.sort((a, b) => a.time - b.time);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // Global Loop
        function update() {
            if (!currentPlayer.paused) {
                const cur = currentPlayer.currentTime;
                const dur = currentPlayer.duration || 0;
                
                if (!isSeeking) {
                    seekBar.value = (cur / dur) * 100 || 0;
                    currentTimeEl.innerText = formatTime(cur);
                    durationEl.innerText = formatTime(dur);
                }

                // Update Lyrics
                const curMs = cur * 1000;
                const active = { Top: "", Center: "", Bottom: "" };
                
                lyrics.forEach(l => {
                    if (l.time <= curMs) {
                        active[l.pos] = l.text;
                    }
                });

                document.getElementById('lyricTop').innerText = active.Top;
                document.getElementById('lyricCenter').innerText = active.Center;
                document.getElementById('lyricBottom').innerText = active.Bottom;
            }
            requestAnimationFrame(update);
        }

        playPauseBtn.onclick = () => {
            if (currentPlayer.paused) {
                currentPlayer.play();
                playPauseBtn.innerText = "⏸";
            } else {
                currentPlayer.pause();
                playPauseBtn.innerText = "▶";
            }
        };

        seekBar.oninput = () => { isSeeking = true; };
        seekBar.onchange = () => {
            const targetTime = (seekBar.value / 100) * currentPlayer.duration;
            currentPlayer.currentTime = targetTime;
            isSeeking = false;
        };

        requestAnimationFrame(update);
    </script>
</body>
</html>
