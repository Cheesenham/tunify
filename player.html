<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL Pro - Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sc-orange: #ff5500;
            --sc-bg: #1a1a1a;
            --sc-surface: #222;
            --sc-border: #2a2a2a;
            --sc-text: #fff;
            --sc-muted: #999;
            --player-h: 80px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--sc-bg); color: var(--sc-text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .topnav { height: 52px; background: #111; border-bottom: 1px solid var(--sc-border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; }
        .topnav .logo { font-size: 1.2rem; font-weight: 700; color: var(--sc-orange); }
        .topnav a { color: var(--sc-muted); text-decoration: none; font-size: 0.82rem; margin-left: auto; }
        .topnav a:hover { color: white; }

        .main-wrap { display: flex; flex: 1; overflow: hidden; }

        .sidebar { width: 210px; background: #111; border-right: 1px solid var(--sc-border); padding: 16px 0; flex-shrink: 0; }
        .nav-item { padding: 10px 18px; cursor: pointer; color: var(--sc-muted); font-size: 0.85rem; display: flex; align-items: center; gap: 12px; transition: 0.15s; border-left: 3px solid transparent; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.04); }
        .nav-item.active { color: white; border-left-color: var(--sc-orange); background: rgba(255,85,0,0.06); }
        .sec-title { padding: 14px 18px 5px; font-size: 0.68rem; color: #444; text-transform: uppercase; letter-spacing: 1.2px; }

        .content { flex: 1; overflow-y: auto; padding: 24px; }
        .content-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; }

        .track-item { display: flex; align-items: center; gap: 12px; padding: 9px 10px; border-radius: 6px; cursor: pointer; transition: 0.12s; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .track-item:hover { background: rgba(255,255,255,0.05); }
        .track-item.playing { background: rgba(255,85,0,0.08); }
        .track-num { width: 22px; text-align: center; font-size: 0.75rem; color: var(--sc-muted); flex-shrink: 0; }
        .track-item.playing .track-num { color: var(--sc-orange); }
        .track-thumb-wrap { position: relative; flex-shrink: 0; }
        .track-thumb { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; background: #333; display: block; }
        .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); border-radius: 4px; display: none; align-items: center; justify-content: center; font-size: 1rem; }
        .track-item:hover .play-overlay { display: flex; }
        .track-info { flex: 1; min-width: 0; }
        .track-name { font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 0.75rem; color: var(--sc-muted); margin-top: 2px; }
        .track-actions { display: flex; gap: 4px; opacity: 0; transition: 0.12s; }
        .track-item:hover .track-actions { opacity: 1; }
        .track-btn { background: none; border: 1px solid #333; color: var(--sc-muted); cursor: pointer; font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; transition: 0.12s; font-family: inherit; }
        .track-btn:hover { color: white; border-color: #555; }

        .playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
        .playlist-card { background: var(--sc-surface); border-radius: 8px; padding: 16px 14px; cursor: pointer; transition: 0.15s; border: 1px solid var(--sc-border); }
        .playlist-card:hover { border-color: var(--sc-orange); background: rgba(255,85,0,0.07); transform: translateY(-2px); }
        .playlist-card .icon { font-size: 2rem; margin-bottom: 10px; }
        .playlist-card .name { font-size: 0.88rem; font-weight: 600; }

        .player-bar { height: var(--player-h); background: #111; border-top: 1px solid var(--sc-border); display: flex; align-items: center; padding: 0 20px; gap: 20px; flex-shrink: 0; }
        .now-playing { display: flex; align-items: center; gap: 12px; width: 240px; flex-shrink: 0; }
        .now-thumb { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; background: #333; flex-shrink: 0; }
        .now-title { font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .now-artist { font-size: 0.72rem; color: var(--sc-muted); margin-top: 1px; }

        .player-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px; }
        .player-controls { display: flex; align-items: center; gap: 14px; }
        .ctrl-btn { background: none; border: none; color: var(--sc-muted); cursor: pointer; font-size: 1rem; padding: 4px 6px; transition: 0.12s; border-radius: 4px; font-family: inherit; }
        .ctrl-btn:hover { color: white; }
        .ctrl-btn.play-btn { width: 34px; height: 34px; border-radius: 50%; background: white; color: black; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.15s; }
        .ctrl-btn.play-btn:hover { background: var(--sc-orange); color: white; }

        .progress-wrap { width: 100%; display: flex; align-items: center; gap: 8px; }
        .time { font-size: 0.7rem; color: var(--sc-muted); min-width: 34px; font-variant-numeric: tabular-nums; }
        .waveform { flex: 1; height: 16px; background: #2a2a2a; border-radius: 2px; cursor: pointer; position: relative; overflow: hidden; }
        .waveform-fill { height: 100%; background: var(--sc-orange); width: 0%; transition: width 0.1s linear; border-radius: 2px; pointer-events: none; }

        .player-right { width: 240px; flex-shrink: 0; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
        .vol-wrap { display: flex; align-items: center; gap: 6px; }
        .vol-slider { width: 72px; accent-color: var(--sc-orange); cursor: pointer; }
        .sync-wrap { display: flex; align-items: center; gap: 4px; }
        .sync-btn { background: none; border: 1px solid #333; color: var(--sc-muted); cursor: pointer; font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; transition: 0.12s; font-family: inherit; }
        .sync-btn:hover { color: white; border-color: #555; }
        .sync-save { color: var(--sc-orange); border-color: var(--sc-orange); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; }
        .modal-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 1px solid #333; border-radius: 12px; padding: 22px; width: 290px; z-index: 101; }
        .modal-box h3 { font-size: 0.95rem; margin-bottom: 16px; }
        .modal-box input, .modal-box select { width: 100%; padding: 10px 12px; background: #111; border: 1px solid #333; border-radius: 6px; color: white; margin-bottom: 14px; outline: none; font-size: 0.85rem; font-family: inherit; }
        .modal-box input:focus, .modal-box select:focus { border-color: var(--sc-orange); }
        .modal-row { display: flex; gap: 8px; }
        .mbtn { flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 0.85rem; font-family: inherit; }
        .mbtn.primary { background: var(--sc-orange); color: white; }
        .mbtn.secondary { background: #333; color: #aaa; }

        .fab { position: fixed; bottom: 96px; right: 22px; background: var(--sc-orange); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 1.3rem; cursor: pointer; box-shadow: 0 4px 16px rgba(255,85,0,0.4); display: flex; align-items: center; justify-content: center; transition: 0.15s; z-index: 50; }
        .fab:hover { background: #e04d00; transform: scale(1.08); }

        .empty { text-align: center; padding: 60px 20px; color: var(--sc-muted); }
        .empty .icon { font-size: 3rem; margin-bottom: 14px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* Now Playing Screen */
        .np-screen {
            position: fixed; inset: 0; z-index: 200;
            background: #111;
            display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .np-screen.open { transform: translateY(0); }

        .np-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px;
            flex-shrink: 0;
        }
        .np-down-btn {
            background: none; border: none; color: var(--sc-muted); cursor: pointer;
            font-size: 1.4rem; padding: 4px 8px; border-radius: 4px; transition: 0.12s;
        }
        .np-down-btn:hover { color: white; }
        .np-label { font-size: 0.75rem; color: var(--sc-muted); text-transform: uppercase; letter-spacing: 1px; }

        .np-body {
            flex: 1; overflow: hidden; display: flex; flex-direction: column;
            align-items: center; padding: 0 24px 24px;
            gap: 20px;
        }

        .np-art {
            width: min(260px, 60vw); height: min(260px, 60vw);
            border-radius: 12px; object-fit: cover; background: #2a2a2a;
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }

        .np-meta { text-align: center; width: 100%; }
        .np-song { font-size: 1.25rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .np-artist { font-size: 0.9rem; color: var(--sc-orange); margin-top: 4px; }

        .np-lyrics-wrap {
            flex: 1; width: 100%; overflow-y: auto; min-height: 0;
            background: #1a1a1a; border-radius: 10px;
            padding: 16px 12px;
        }
        .np-lyrics-wrap::-webkit-scrollbar { width: 3px; }
        .np-lyrics-wrap::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .np-lyric-line {
            padding: 7px 10px; border-radius: 6px;
            font-size: 0.9rem; color: #555;
            text-align: center; transition: color 0.25s, background 0.25s;
            cursor: pointer; line-height: 1.5;
        }
        .np-lyric-line:hover { color: #888; }
        .np-lyric-line.active {
            color: white; font-weight: 600;
            background: rgba(255,85,0,0.12);
        }
        .np-no-lyrics { text-align: center; color: #444; font-size: 0.85rem; padding: 20px; }

        .np-progress-wrap {
            width: 100%; flex-shrink: 0;
        }
        .np-waveform {
            width: 100%; height: 4px; background: #2a2a2a; border-radius: 2px;
            cursor: pointer; position: relative; margin-bottom: 8px;
        }
        .np-waveform-fill {
            height: 100%; background: var(--sc-orange); width: 0%; border-radius: 2px;
            pointer-events: none; transition: width 0.1s linear;
        }
        .np-times { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--sc-muted); }

        .np-controls {
            display: flex; align-items: center; gap: 20px; flex-shrink: 0;
            padding-bottom: 8px;
        }
        .np-ctrl { background: none; border: none; color: var(--sc-muted); cursor: pointer; font-size: 1.3rem; padding: 4px 8px; transition: 0.12s; border-radius: 4px; }
        .np-ctrl:hover { color: white; }
        .np-play { width: 54px; height: 54px; border-radius: 50%; background: var(--sc-orange); color: white; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.15s; }
        .np-play:hover { background: #e04d00; transform: scale(1.05); }

        /* Lyrics Search Modal */
        .lrc-modal { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.85); flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 60px; }
        .lrc-modal.open { display: flex; }
        .lrc-box { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; width: min(420px, 92vw); max-height: 70vh; display: flex; flex-direction: column; overflow: hidden; }
        .lrc-header { padding: 14px 16px; border-bottom: 1px solid #2a2a2a; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .lrc-header input { flex: 1; padding: 9px 12px; background: #111; border: 1px solid #333; border-radius: 6px; color: white; font-size: 0.85rem; font-family: inherit; outline: none; }
        .lrc-header input:focus { border-color: var(--sc-orange); }
        .lrc-search-btn { padding: 9px 14px; background: var(--sc-orange); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 0.82rem; white-space: nowrap; }
        .lrc-close-btn { padding: 9px 10px; background: #333; color: #aaa; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; }
        .lrc-results { overflow-y: auto; flex: 1; padding: 8px; }
        .lrc-result-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; border-bottom: 1px solid #2a2a2a; transition: 0.12s; }
        .lrc-result-item:hover { background: rgba(255,85,0,0.1); }
        .lrc-result-title { font-size: 0.88rem; font-weight: 600; }
        .lrc-result-artist { font-size: 0.75rem; color: var(--sc-muted); margin-top: 2px; }
        .lrc-result-item.selected { background: rgba(255,85,0,0.18); border-color: var(--sc-orange); }
        .lrc-footer { padding: 10px 12px; border-top: 1px solid #2a2a2a; display: flex; gap: 8px; flex-shrink: 0; }
        .lrc-footer button { flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 0.85rem; font-family: inherit; }
        .lrc-apply { background: var(--sc-orange); color: white; }
        .lrc-cancel { background: #333; color: #aaa; }
        .lrc-status { padding: 16px; text-align: center; color: var(--sc-muted); font-size: 0.83rem; }
    </style>
</head>
<body>
    <nav class="topnav">
        <div class="logo">MPL</div>
        <a href="/">← Home</a>
    </nav>

    <div class="main-wrap">
        <aside class="sidebar">
            <div class="sec-title">Library</div>
            <div class="nav-item active" id="nav-all" onclick="setView('all')">
                <span>🎵</span> All Tracks
            </div>
            <div class="nav-item" id="nav-playlist" onclick="setView('playlist')">
                <span>📁</span> Playlists
            </div>
            <div class="sec-title" style="margin-top:12px;">Tools</div>
            <div class="nav-item" onclick="openCreatePlaylist()">
                <span>＋</span> New Playlist
            </div>
            <div class="nav-item" id="nav-sync" onclick="toggleSync()">
                <span>⏱</span> Lyrics Sync
            </div>
        </aside>

        <main class="content">
            <div class="content-title" id="view-title">All Tracks</div>
            <div id="track-list"></div>
        </main>
    </div>

    <!-- Now Playing Full Screen -->
    <div class="np-screen" id="np-screen">
        <div class="np-header">
            <button class="np-down-btn" onclick="closeNowPlaying()">⌄</button>
            <div class="np-label">Now Playing</div>
            <button class="np-down-btn" onclick="openLyricsSearch()" title="가사 검색" style="font-size:1rem;">🔍</button>
        </div>
        <div class="np-body">
            <img id="np-art" class="np-art" src="" onerror="this.style.background='#2a2a2a'">
            <div class="np-meta">
                <div class="np-song" id="np-song">—</div>
                <div class="np-artist" id="np-artist-label">—</div>
            </div>
            <div class="np-lyrics-wrap" id="np-lyrics-wrap">
                <div class="np-no-lyrics">가사가 없습니다.</div>
            </div>
            <div class="np-progress-wrap">
                <div class="np-waveform" onclick="npSeekTo(event)">
                    <div class="np-waveform-fill" id="np-waveform-fill"></div>
                </div>
                <div class="np-times">
                    <span id="np-cur">0:00</span>
                    <span id="np-dur">0:00</span>
                </div>
            </div>
            <div class="np-controls">
                <button class="np-ctrl" onclick="prevTrack()">⏮</button>
                <button class="np-play" id="np-play-btn" onclick="togglePlay()">▶</button>
                <button class="np-ctrl" onclick="nextTrack()">⏭</button>
            </div>
        </div>
    </div>

    <div class="player-bar">
        <div class="now-playing" onclick="openNowPlaying()" style="cursor:pointer;">
            <img id="now-thumb" class="now-thumb" src="" alt="" onerror="this.src=''">
            <div>
                <div id="now-title" class="now-title" style="color:var(--sc-muted);">No track selected</div>
                <div id="now-artist" class="now-artist">—</div>
            </div>
        </div>
        <div class="player-center">
            <div class="player-controls">
                <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
                <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlay()">▶</button>
                <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
            </div>
            <div class="progress-wrap">
                <span class="time" id="cur-time">0:00</span>
                <div class="waveform" onclick="seekTo(event)">
                    <div class="waveform-fill" id="waveform-fill"></div>
                </div>
                <span class="time" id="dur-time">0:00</span>
            </div>
        </div>
        <div class="player-right">
            <div class="sync-wrap" id="sync-controls" style="display:none;">
                <button class="sync-btn" onclick="adjustSync(-0.1)">−0.1s</button>
                <button class="sync-btn" onclick="adjustSync(0.1)">+0.1s</button>
                <button class="sync-btn sync-save" id="save-btn" style="display:none;" onclick="saveSync()">Save</button>
            </div>
            <div class="vol-wrap">
                <span style="color:var(--sc-muted); font-size:0.85rem;">🔊</span>
                <input type="range" class="vol-slider" min="0" max="1" step="0.05" value="1" oninput="audio.volume=this.value">
            </div>
        </div>
    </div>

    <button class="fab" onclick="openCreatePlaylist()">＋</button>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-box" id="modal-box">
        <h3 id="modal-title"></h3>
        <div id="modal-body"></div>
        <div class="modal-row">
            <button class="mbtn primary" id="modal-ok">OK</button>
            <button class="mbtn secondary" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <!-- Lyrics Search Modal -->
    <div class="lrc-modal" id="lrc-modal">
        <div class="lrc-box">
            <div class="lrc-header">
                <input type="text" id="lrc-query" placeholder="곡명 아티스트 검색..." onkeydown="if(event.key==='Enter') doLyricsSearch()">
                <button class="lrc-search-btn" onclick="doLyricsSearch()">검색</button>
                <button class="lrc-close-btn" onclick="closeLyricsSearch()">✕</button>
            </div>
            <div class="lrc-results" id="lrc-results">
                <div class="lrc-status">검색어를 입력하세요.</div>
            </div>
            <div class="lrc-footer">
                <button class="lrc-apply" onclick="applyLyrics()">적용</button>
                <button class="lrc-cancel" onclick="closeLyricsSearch()">취소</button>
            </div>
        </div>
    </div>

    <audio id="audio" style="display:none;"></audio>

    <script>
        const PI_URL = (localStorage.getItem('MPL_URL') || '').replace(/\/$/, '');
        const UID = localStorage.getItem('MPL_USER') || 'admin';
        const NGROK_HEADERS = { 'ngrok-skip-browser-warning': 'true', 'Content-Type': 'application/json' };
        function apiFetch(url, opts = {}) {
            return fetch(url, { ...opts, headers: { ...NGROK_HEADERS, ...(opts.headers || {}) } });
        }
        const audio = document.getElementById('audio');

        let allFiles = [], playlists = [], trackList = [], currentIdx = 0, currentItem = null;
        let lyrics = [], activeView = 'all', syncOffset = 0;

        // --- View ---
        function setView(v) {
            activeView = v;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + v)?.classList.add('active');
            renderView();
        }

        async function loadData() {
            try {
                const r = await apiFetch(`${PI_URL}/api/files`);
                const d = await r.json();
                allFiles = (d.files || []).map(f => ({
                    ...f,
                    url: PI_URL + f.path,
                    mpl_url: f.lrc_path ? PI_URL + f.lrc_path : null
                }));
            } catch(e) { allFiles = []; }
            try {
                const r = await apiFetch(`${PI_URL}/api/playlists?uid=${UID}`);
                const d = await r.json();
                playlists = d.playlists || [];
            } catch(e) { playlists = []; }
        }

        async function renderView() {
            const container = document.getElementById('track-list');
            document.getElementById('view-title').innerText = activeView === 'all' ? 'All Tracks' : 'Playlists';
            container.innerHTML = '<div style="color:#444; padding:20px; font-size:0.85rem;">Loading...</div>';
            await loadData();

            if (activeView === 'all') {
                trackList = allFiles;
                if (!trackList.length) {
                    container.innerHTML = '<div class="empty"><div class="icon">🎵</div>No tracks yet.<br>Use Maker to add music!</div>';
                    return;
                }
                container.innerHTML = trackList.map((f, i) => `
                    <div class="track-item ${currentItem?.id === f.id ? 'playing' : ''}" id="track-${f.id}" data-idx="${i}" onclick="playByIdx(${i})">
                        <div class="track-num">${currentItem?.id === f.id ? '♫' : i + 1}</div>
                        <div class="track-thumb-wrap">
                            <img class="track-thumb" src="${f.thumbnail || ''}" onerror="this.style.background='#444'">
                            <div class="play-overlay">▶</div>
                        </div>
                        <div class="track-info">
                            <div class="track-name">${f.filename}</div>
                            <div class="track-artist">${f.artist || '—'}</div>
                        </div>
                        <div class="track-actions">
                            <button class="track-btn" onclick="event.stopPropagation(); showAddToPlaylist(${f.id})">＋</button>
                            <button class="track-btn" onclick="event.stopPropagation(); deleteTrack('${f.id}', \`${f.filename.replace(/`/g,"'")}\`)" style="color:#f87171; border-color:#4a1a1a;">🗑</button>
                        </div>
                    </div>
                `).join('');
            } else {
                if (!playlists.length) {
                    container.innerHTML = '<div class="empty"><div class="icon">📁</div>No playlists yet.</div>';
                    return;
                }
                container.innerHTML = '<div class="playlist-grid">' + playlists.map(p => `
                    <div class="playlist-card" onclick='openPlaylist(${p.id}, "${p.name.replace(/"/g,"&quot;")}") '>
                        <div class="icon">📁</div>
                        <div class="name">${p.name}</div>
                    </div>
                `).join('') + '</div>';
            }
        }

        function openPlaylist(pid, name) {
            const pl = playlists.find(p => p.id === pid);
            if (!pl) return;
            trackList = allFiles.filter(f => pl.items.includes(f.id));
            const container = document.getElementById('track-list');
            document.getElementById('view-title').innerText = '📁 ' + name;
            container.innerHTML = `
                <div style="margin-bottom:14px;">
                    <button class="track-btn" onclick="setView('playlist')">← Back</button>
                </div>
                ${trackList.map((f, i) => `
                    <div class="track-item" onclick='playSong(${JSON.stringify(f).replace(/'/g,"&#39;")}, ${i})'>
                        <div class="track-num">${i + 1}</div>
                        <div class="track-thumb-wrap">
                            <img class="track-thumb" src="${f.thumbnail || ''}" onerror="this.style.background='#444'">
                            <div class="play-overlay">▶</div>
                        </div>
                        <div class="track-info">
                            <div class="track-name">${f.filename}</div>
                            <div class="track-artist">${f.artist || '—'}</div>
                        </div>
                    </div>
                `).join('')}
            `;
        }

        // --- Playback ---
        function playByIdx(i) { playSong(trackList[i], i); }

        async function playSong(item, idx) {
            currentItem = item;
            currentIdx = idx;
            document.querySelectorAll('.track-item').forEach(el => el.classList.remove('playing'));
            document.getElementById('track-' + item.id)?.classList.add('playing');
            document.getElementById('now-thumb').src = item.thumbnail || '';
            document.getElementById('now-title').innerText = item.filename;
            document.getElementById('now-title').style.color = '#aaa';
            document.getElementById('now-artist').innerText = item.artist || '—';
            document.getElementById('np-art').src = item.thumbnail || '';
            document.getElementById('np-song').innerText = item.filename;
            document.getElementById('np-artist-label').innerText = item.artist || '—';
            document.getElementById('play-btn').innerText = '⏸';
            document.getElementById('np-play-btn').innerText = '⏸';
            lyrics = []; syncOffset = 0;

            // ngrok은 <audio> 직접 요청을 HTML 경고 페이지로 반환 →
            // apiFetch로 Blob 다운 후 objectURL 사용
            audio.pause();
            if (audio._blobUrl) { URL.revokeObjectURL(audio._blobUrl); audio._blobUrl = null; }
            try {
                const resp = await apiFetch(item.url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const blob = await resp.blob();
                audio._blobUrl = URL.createObjectURL(blob);
                audio.src = audio._blobUrl;
                document.getElementById('now-title').style.color = 'white';
                audio.play().catch(e => console.error('play:', e));
            } catch(e) {
                document.getElementById('now-title').innerText = '로드 실패: ' + e.message;
                document.getElementById('now-title').style.color = '#f87171';
                return;
            }

            if (item.mpl_url) {
                try {
                    const r = await apiFetch(item.mpl_url);
                    const d = await r.json();
                    lyrics = d.synced_lyrics || [];
                } catch(e) {}
            }
            renderNPLyrics();
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                document.getElementById('play-btn').innerText = '⏸';
                document.getElementById('np-play-btn').innerText = '⏸';
            } else {
                audio.pause();
                document.getElementById('play-btn').innerText = '▶';
                document.getElementById('np-play-btn').innerText = '▶';
            }
        }
        function prevTrack() { if (currentIdx > 0) playSong(trackList[currentIdx - 1], currentIdx - 1); }
        function nextTrack() { if (currentIdx < trackList.length - 1) playSong(trackList[currentIdx + 1], currentIdx + 1); }
        audio.onended = () => nextTrack();

        function seekTo(e) {
            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }

        function fmtTime(s) {
            if (!s || isNaN(s)) return '0:00';
            return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
        }

        audio.onerror = () => {
            const c = {1:'재생취소',2:'네트워크오류',3:'디코드오류',4:'지원안됨'};
            const msg = c[audio.error?.code] || '알수없음';
            document.getElementById('now-title').innerText = `재생오류: ${msg}`;
            document.getElementById('now-title').style.color = '#f87171';
            console.error('Audio error', audio.error?.code, audio.src);
        };

        audio.ontimeupdate = () => {
            const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
            document.getElementById('waveform-fill').style.width = pct + '%';
            document.getElementById('cur-time').innerText = fmtTime(audio.currentTime);
            document.getElementById('dur-time').innerText = fmtTime(audio.duration);
            // NP screen
            document.getElementById('np-waveform-fill').style.width = pct + '%';
            document.getElementById('np-cur').innerText = fmtTime(audio.currentTime);
            document.getElementById('np-dur').innerText = fmtTime(audio.duration);
            // Lyrics highlight
            if (lyrics.length) {
                const t = audio.currentTime + syncOffset;
                let active = -1;
                for (let i = 0; i < lyrics.length; i++) {
                    if (lyrics[i].time <= t) active = i; else break;
                }
                const lines = document.querySelectorAll('.np-lyric-line');
                lines.forEach((el, i) => {
                    const wasActive = el.classList.contains('active');
                    el.classList.toggle('active', i === active);
                    if (i === active && !wasActive) {
                        el.scrollIntoView({ block: 'center', behavior: 'smooth' });
                    }
                });
            }
        };

        // --- Now Playing Screen ---
        function openNowPlaying() {
            if (!currentItem) return;
            document.getElementById('np-screen').classList.add('open');
        }
        function closeNowPlaying() {
            document.getElementById('np-screen').classList.remove('open');
        }
        function npSeekTo(e) {
            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }
        function lrcSeek(t) {
            audio.currentTime = t;
            if (audio.paused) audio.play().catch(() => {});
        }

        function renderNPLyrics() {
            const wrap = document.getElementById('np-lyrics-wrap');
            if (!lyrics.length) {
                wrap.innerHTML = '<div class="np-no-lyrics">가사가 없습니다.</div>';
                return;
            }
            wrap.innerHTML = lyrics.map((l, i) =>
                `<div class="np-lyric-line" data-i="${i}" onclick="lrcSeek(${l.time})">${l.text || '♪'}</div>`
            ).join('');
        }

        // --- Sync ---
        function toggleSync() {
            const sc = document.getElementById('sync-controls');
            const visible = sc.style.display !== 'none';
            sc.style.display = visible ? 'none' : 'flex';
            document.getElementById('nav-sync').classList.toggle('active', !visible);
        }
        function adjustSync(v) {
            syncOffset += v;
            document.getElementById('save-btn').style.display = 'inline-block';
        }
        async function saveSync() {
            if (!currentItem) return;
            const adjusted = lyrics.map(l => ({ ...l, time: +(l.time + syncOffset).toFixed(2) }));
            await apiFetch(`${PI_URL}/api/edit`, {
                method: 'POST',
                body: JSON.stringify({ id: currentItem.id, title: currentItem.filename, artist: currentItem.artist, lyrics: adjusted })
            });
            lyrics = adjusted;
            syncOffset = 0;
            document.getElementById('save-btn').style.display = 'none';
        }

        // --- Playlists ---
        function openCreatePlaylist() {
            document.getElementById('modal-title').innerText = 'New Playlist';
            document.getElementById('modal-body').innerHTML = '<input type="text" id="pName" placeholder="Playlist name...">';
            document.getElementById('modal-ok').onclick = async () => {
                const name = document.getElementById('pName').value.trim();
                if (!name) return;
                await apiFetch(`${PI_URL}/api/playlists`, {
                    method: 'POST',
                    body: JSON.stringify({ uid: UID, name })
                });
                closeModal();
                if (activeView === 'playlist') renderView();
            };
            showModal();
        }

        async function showAddToPlaylist(fileId) {
            document.getElementById('modal-title').innerText = 'Add to Playlist';
            document.getElementById('modal-body').innerHTML = `
                <select id="pSelect">
                    ${playlists.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
                </select>
            `;
            document.getElementById('modal-ok').onclick = async () => {
                const pid = parseInt(document.getElementById('pSelect').value);
                await apiFetch(`${PI_URL}/api/playlists/add`, {
                    method: 'POST',
                    body: JSON.stringify({ uid: UID, playlist_id: pid, file_id: fileId })
                });
                closeModal();
            };
            showModal();
        }

        function showModal() {
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('modal-box').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('modal-box').style.display = 'none';
        }

        // --- Lyrics Search (lrclib.net 직접 호출) ---
        let lrcResults = [], lrcSelectedIdx = -1;

        function parseLrc(lrcStr) {
            const lines = [];
            for (const line of lrcStr.split('\n')) {
                const m = line.trim().match(/^\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
                if (m) {
                    const t = parseInt(m[1]) * 60 + parseFloat(m[2]);
                    const text = m[3].trim();
                    lines.push({ time: Math.round(t * 100) / 100, text });
                }
            }
            return lines;
        }

        function openLyricsSearch() {
            const q = currentItem ? `${currentItem.filename} ${currentItem.artist || ''}`.trim() : '';
            document.getElementById('lrc-query').value = q;
            lrcResults = [];
            lrcSelectedIdx = -1;
            document.getElementById('lrc-results').innerHTML = '<div class="lrc-status">검색어를 입력하세요.</div>';
            document.getElementById('lrc-modal').classList.add('open');
            setTimeout(() => document.getElementById('lrc-query').focus(), 100);
            if (q) doLyricsSearch();
        }

        function closeLyricsSearch() {
            document.getElementById('lrc-modal').classList.remove('open');
        }

        async function doLyricsSearch() {
            const q = document.getElementById('lrc-query').value.trim();
            if (!q) return;
            const resultsEl = document.getElementById('lrc-results');
            resultsEl.innerHTML = '<div class="lrc-status">검색 중...</div>';
            lrcResults = [];
            lrcSelectedIdx = -1;
            try {
                const r = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(q)}`, {
                    headers: { 'Lrclib-Client': 'Tunify/1.0' }
                });
                const data = await r.json();
                lrcResults = data
                    .filter(item => item.syncedLyrics)
                    .slice(0, 8)
                    .map(item => ({
                        title: item.trackName || '',
                        artist: item.artistName || '',
                        album: item.albumName || '',
                        duration: item.duration || 0,
                        lyrics: parseLrc(item.syncedLyrics)
                    }))
                    .filter(r => r.lyrics.length > 0);
                if (lrcResults.length) {
                    lrcSelectedIdx = 0;
                    renderLrcResults();
                } else {
                    resultsEl.innerHTML = '<div class="lrc-status">싱크 가사를 찾지 못했습니다.<br><small>다른 검색어를 시도해 보세요.</small></div>';
                }
            } catch(e) {
                resultsEl.innerHTML = `<div class="lrc-status">오류: ${e.message}</div>`;
            }
        }

        function renderLrcResults() {
            const resultsEl = document.getElementById('lrc-results');
            if (!lrcResults.length) {
                resultsEl.innerHTML = '<div class="lrc-status">결과 없음</div>';
                return;
            }
            resultsEl.innerHTML = lrcResults.map((r, i) => `
                <div class="lrc-result-item ${i === lrcSelectedIdx ? 'selected' : ''}" onclick="selectLrcResult(${i})">
                    <div class="lrc-result-title">${r.title || '(제목 없음)'}</div>
                    <div class="lrc-result-artist">${r.artist || ''}${r.album ? ' · ' + r.album : ''} · ${r.lyrics.length}줄</div>
                </div>
            `).join('');
        }

        function selectLrcResult(idx) {
            lrcSelectedIdx = idx;
            renderLrcResults();
        }

        async function applyLyrics() {
            if (!currentItem || lrcSelectedIdx < 0 || !lrcResults[lrcSelectedIdx]) return;
            const selected = lrcResults[lrcSelectedIdx];
            const newLyrics = selected.lyrics;
            try {
                await apiFetch(`${PI_URL}/api/edit`, {
                    method: 'POST',
                    body: JSON.stringify({
                        id: currentItem.id,
                        title: currentItem.filename,
                        artist: currentItem.artist,
                        lyrics: newLyrics
                    })
                });
                lyrics = newLyrics;
                syncOffset = 0;
                renderNPLyrics();
                closeLyricsSearch();
                // reload file info to update lrc_path reference
                const updatedIdx = allFiles.findIndex(f => f.id === currentItem.id);
                if (updatedIdx >= 0 && !allFiles[updatedIdx].lrc_path) {
                    allFiles[updatedIdx].lrc_path = `/api/media/${currentItem.uid || UID}/mpl_${currentItem.id}.json`;
                    currentItem.mpl_url = PI_URL + allFiles[updatedIdx].lrc_path;
                }
            } catch(e) {
                alert('저장 실패: ' + e.message);
            }
        }

        // --- Delete ---
        async function deleteTrack(id, name) {
            if (!confirm(`"${name}" 삭제할까요?`)) return;
            try {
                await apiFetch(`${PI_URL}/api/files/${id}`, { method: 'DELETE' });
                if (currentItem && String(currentItem.id) === String(id)) {
                    audio.pause();
                    audio.src = '';
                    currentItem = null;
                    document.getElementById('now-title').innerText = 'No track selected';
                    document.getElementById('now-title').style.color = 'var(--sc-muted)';
                    document.getElementById('now-artist').innerText = '—';
                    document.getElementById('now-thumb').src = '';
                }
                renderView();
            } catch(e) { alert('삭제 실패: ' + e.message); }
        }

        window.onload = () => renderView();
    </script>
</body>
</html>
