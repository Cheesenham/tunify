<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL Pro - Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sc-orange: #ff5500;
            --sc-bg: #1a1a1a;
            --sc-surface: #222;
            --sc-border: #2a2a2a;
            --sc-text: #fff;
            --sc-muted: #999;
            --player-h: 80px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--sc-bg); color: var(--sc-text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .topnav { height: 52px; background: #111; border-bottom: 1px solid var(--sc-border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; }
        .topnav .logo { font-size: 1.2rem; font-weight: 700; color: var(--sc-orange); }
        .topnav a { color: var(--sc-muted); text-decoration: none; font-size: 0.82rem; margin-left: auto; }
        .topnav a:hover { color: white; }

        .main-wrap { display: flex; flex: 1; overflow: hidden; }

        .sidebar { width: 210px; background: #111; border-right: 1px solid var(--sc-border); padding: 16px 0; flex-shrink: 0; }
        .nav-item { padding: 10px 18px; cursor: pointer; color: var(--sc-muted); font-size: 0.85rem; display: flex; align-items: center; gap: 12px; transition: 0.15s; border-left: 3px solid transparent; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.04); }
        .nav-item.active { color: white; border-left-color: var(--sc-orange); background: rgba(255,85,0,0.06); }
        .sec-title { padding: 14px 18px 5px; font-size: 0.68rem; color: #444; text-transform: uppercase; letter-spacing: 1.2px; }

        .content { flex: 1; overflow-y: auto; padding: 24px; padding-bottom: calc(24px + var(--player-h)); }
        .content-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; }

        .track-item { display: flex; align-items: center; gap: 12px; padding: 9px 10px; border-radius: 6px; cursor: pointer; transition: 0.12s; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .track-item:hover { background: rgba(255,255,255,0.05); }
        .track-item.playing { background: rgba(255,85,0,0.08); }
        .track-num { width: 22px; text-align: center; font-size: 0.75rem; color: var(--sc-muted); flex-shrink: 0; }
        .track-item.playing .track-num { color: var(--sc-orange); }
        .track-thumb-wrap {
            position: relative; flex-shrink: 0;
            width: 44px; height: 44px;
            border-radius: 4px; overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e, #2a2a2a);
            display: flex; align-items: center; justify-content: center;
        }
        .track-thumb-wrap::before { content: '♪'; font-size: 1.1rem; color: #444; position: absolute; }
        .track-thumb { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; display: block; position: relative; z-index: 1; transition: opacity 0.15s; }
        .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); border-radius: 4px; display: none; align-items: center; justify-content: center; font-size: 1rem; }
        .track-item:hover .play-overlay { display: flex; }
        .track-info { flex: 1; min-width: 0; }
        .track-name { font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 0.75rem; color: var(--sc-muted); margin-top: 2px; }
        .track-actions { display: flex; gap: 4px; opacity: 0; transition: 0.12s; }
        .track-item:hover .track-actions { opacity: 1; }
        .track-btn { background: none; border: 1px solid #333; color: var(--sc-muted); cursor: pointer; font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; transition: 0.12s; font-family: inherit; }
        .track-btn:hover { color: white; border-color: #555; }

        .playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
        .playlist-card { background: var(--sc-surface); border-radius: 8px; padding: 14px 12px; transition: 0.15s; border: 1px solid var(--sc-border); }
        .playlist-card:hover { border-color: var(--sc-orange); background: rgba(255,85,0,0.07); }
        .playlist-card .icon { font-size: 2rem; margin-bottom: 8px; }
        .playlist-card .name { font-size: 0.88rem; font-weight: 600; cursor: pointer; }
        .playlist-card .count { font-size: 0.72rem; color: #666; margin-top: 4px; }
        .playlist-card-actions { display: flex; gap: 6px; margin-top: 10px; }
        .pl-action-btn { flex: 1; padding: 6px 4px; border-radius: 6px; border: 1px solid #333; background: none; color: #aaa; font-size: 0.75rem; cursor: pointer; font-family: inherit; transition: 0.12s; }
        .pl-action-btn:hover { border-color: var(--sc-orange); color: white; background: rgba(255,85,0,0.1); }
        .pl-action-btn.shuffle { color: #4ade80; border-color: #1a4a2a; }
        .pl-action-btn.shuffle:hover { background: rgba(74,222,128,0.1); border-color: #4ade80; }

        /* Context menu */
        .ctx-menu { display: none; position: fixed; z-index: 500; background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 6px 0; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        .ctx-menu-item { padding: 11px 16px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; transition: 0.1s; }
        .ctx-menu-item:hover { background: rgba(255,85,0,0.1); color: white; }

        /* Queue badge */
        .queue-badge { position: relative; background: none; border: 1px solid #333; color: #aaa; cursor: pointer; font-size: 0.8rem; padding: 5px 10px; border-radius: 6px; font-family: inherit; transition: 0.12s; }
        .queue-badge:hover { color: white; border-color: #555; }
        .queue-badge .badge-count { position: absolute; top: -6px; right: -6px; background: var(--sc-orange); color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .shuffle-indicator { color: #4ade80; border-color: #1a4a2a !important; }

        /* Queue panel */
        .queue-panel { display: none; position: fixed; inset: 0; z-index: 250; background: rgba(0,0,0,0.7); }
        .queue-panel.open { display: flex; align-items: flex-end; }
        .queue-inner { background: #1a1a1a; border-top: 1px solid #2a2a2a; border-radius: 16px 16px 0 0; width: 100%; max-height: 75vh; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom); }
        .queue-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
        .queue-header h3 { font-size: 0.9rem; font-weight: 700; }
        .queue-header-actions { display: flex; gap: 8px; align-items: center; }
        .queue-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid #333; background: none; color: #aaa; font-size: 0.75rem; cursor: pointer; font-family: inherit; transition: 0.12s; }
        .queue-btn:hover { color: white; border-color: #555; }
        .queue-btn.active { color: #4ade80; border-color: #4ade80; }
        .queue-list { overflow-y: auto; flex: 1; padding: 8px; }
        .queue-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 6px; border-bottom: 1px solid #222; }
        .queue-item-info { flex: 1; min-width: 0; }
        .queue-item-title { font-size: 0.83rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .queue-item-artist { font-size: 0.72rem; color: var(--sc-muted); margin-top: 1px; }
        .queue-item-remove { background: none; border: none; color: #555; cursor: pointer; font-size: 1rem; padding: 4px 6px; border-radius: 4px; transition: 0.12s; flex-shrink: 0; }
        .queue-item-remove:hover { color: #f87171; }
        .drag-handle { background: none; border: none; color: #444; cursor: grab; font-size: 1.1rem; padding: 6px 8px; touch-action: none; user-select: none; flex-shrink: 0; line-height: 1; }
        .drag-handle:active { cursor: grabbing; color: #aaa; }
        .queue-item.drag-source { opacity: 0.4; background: rgba(255,85,0,0.05); }
        .queue-item.drag-over-top { border-top: 2px solid var(--sc-orange); }
        .queue-item.drag-over-bottom { border-bottom: 2px solid var(--sc-orange); }

        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 90; height: var(--player-h); background: #111; border-top: 1px solid var(--sc-border); display: flex; align-items: center; padding: 0 20px; gap: 20px; }
        .now-playing { display: flex; align-items: center; gap: 12px; width: 240px; flex-shrink: 0; }
        .now-thumb { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; background: #333; flex-shrink: 0; }
        .now-title { font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .now-artist { font-size: 0.72rem; color: var(--sc-muted); margin-top: 1px; }

        .player-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px; }
        .player-controls { display: flex; align-items: center; gap: 14px; }
        .ctrl-btn { background: none; border: none; color: var(--sc-muted); cursor: pointer; font-size: 1rem; padding: 4px 6px; transition: 0.12s; border-radius: 4px; font-family: inherit; }
        .ctrl-btn:hover { color: white; }
        .ctrl-btn.play-btn { width: 34px; height: 34px; border-radius: 50%; background: white; color: black; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.15s; }
        .ctrl-btn.play-btn:hover { background: var(--sc-orange); color: white; }

        .progress-wrap { width: 100%; display: flex; align-items: center; gap: 8px; }
        .time { font-size: 0.7rem; color: var(--sc-muted); min-width: 34px; font-variant-numeric: tabular-nums; }
        .waveform { flex: 1; height: 16px; background: #2a2a2a; border-radius: 2px; cursor: pointer; position: relative; overflow: hidden; }
        .waveform-fill { height: 100%; background: var(--sc-orange); width: 0%; transition: width 0.1s linear; border-radius: 2px; pointer-events: none; }

        .player-right { width: 240px; flex-shrink: 0; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
        .vol-wrap { display: flex; align-items: center; gap: 6px; }
        .vol-slider { width: 72px; accent-color: var(--sc-orange); cursor: pointer; }
        .sync-wrap { display: flex; align-items: center; gap: 4px; }
        .sync-btn { background: none; border: 1px solid #333; color: var(--sc-muted); cursor: pointer; font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; transition: 0.12s; font-family: inherit; }
        .sync-btn:hover { color: white; border-color: #555; }
        .sync-save { color: var(--sc-orange); border-color: var(--sc-orange); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; }
        .modal-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 1px solid #333; border-radius: 12px; padding: 22px; width: 290px; z-index: 101; }
        .modal-box h3 { font-size: 0.95rem; margin-bottom: 16px; }
        .modal-box input, .modal-box select { width: 100%; padding: 10px 12px; background: #111; border: 1px solid #333; border-radius: 6px; color: white; margin-bottom: 14px; outline: none; font-size: 0.85rem; font-family: inherit; }
        .modal-box input:focus, .modal-box select:focus { border-color: var(--sc-orange); }
        .modal-row { display: flex; gap: 8px; }
        .mbtn { flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 0.85rem; font-family: inherit; }
        .mbtn.primary { background: var(--sc-orange); color: white; }
        .mbtn.secondary { background: #333; color: #aaa; }

        .fab { position: fixed; bottom: 96px; right: 22px; background: var(--sc-orange); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 1.3rem; cursor: pointer; box-shadow: 0 4px 16px rgba(255,85,0,0.4); display: flex; align-items: center; justify-content: center; transition: 0.15s; z-index: 50; }
        .fab:hover { background: #e04d00; transform: scale(1.08); }

        .empty { text-align: center; padding: 60px 20px; color: var(--sc-muted); }
        .empty .icon { font-size: 3rem; margin-bottom: 14px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* ── Now Playing Screen ── */
        .np-screen {
            position: fixed; inset: 0; z-index: 200;
            background: #111; display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .np-screen.open { transform: translateY(0); }

        .np-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; flex-shrink: 0;
        }
        .np-down-btn { background: none; border: none; color: var(--sc-muted); cursor: pointer; font-size: 1.4rem; padding: 4px 8px; border-radius: 4px; transition: 0.12s; }
        .np-down-btn:hover { color: white; }
        .np-label { font-size: 0.72rem; color: var(--sc-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* Portrait: column */
        .np-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

        .np-left {
            display: flex; flex-direction: column; align-items: center;
            gap: 10px; padding: 8px 24px 12px; flex-shrink: 0;
            max-height: 56vh; overflow: hidden;
        }
        .np-art-wrap {
            position: relative; flex-shrink: 0;
            width: min(170px, 38vw); height: min(170px, 38vw);
            border-radius: 12px; overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #2a2a3a 100%);
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
        }
        .np-art-wrap::before {
            content: '♪'; font-size: 3.5rem; color: #333;
            position: absolute; pointer-events: none;
        }
        .np-art {
            width: 100%; height: 100%;
            border-radius: 12px; object-fit: cover;
            position: relative; z-index: 1;
            transition: opacity 0.2s;
        }
        .np-meta { text-align: center; width: 100%; }
        .np-song { font-size: 1.1rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .np-artist { font-size: 0.85rem; color: var(--sc-orange); margin-top: 3px; }

        .np-progress-wrap { width: 100%; flex-shrink: 0; }
        .np-waveform { width: 100%; height: 4px; background: #2a2a2a; border-radius: 2px; cursor: pointer; margin-bottom: 6px; }
        .np-waveform-fill { height: 100%; background: var(--sc-orange); width: 0%; border-radius: 2px; pointer-events: none; transition: width 0.1s linear; }
        .np-times { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--sc-muted); }

        .np-controls { display: flex; align-items: center; gap: 20px; }
        .np-ctrl { background: none; border: none; color: var(--sc-muted); cursor: pointer; font-size: 1.3rem; padding: 4px 8px; border-radius: 4px; transition: 0.12s; }
        .np-ctrl:hover { color: white; }
        .np-play { width: 52px; height: 52px; border-radius: 50%; background: var(--sc-orange); color: white; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.15s; }
        .np-play:hover { background: #e04d00; }

        .np-no-lyrics {
            color: #444; font-size: 0.8rem; text-align: center;
            padding: 20px; letter-spacing: 0.5px;
        }
        .np-lyrics-wrap {
            flex: 1; overflow-y: auto; min-height: 80px; min-width: 0;
            background: #1a1a1a; margin: 0 12px 12px; border-radius: 10px; padding: 12px;
        }
        .np-lyrics-wrap::-webkit-scrollbar { width: 3px; }
        .np-lyrics-wrap::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .np-lyric-line { padding: 7px 10px; border-radius: 6px; font-size: 0.88rem; color: #555; text-align: center; transition: color 0.25s, background 0.25s; cursor: pointer; line-height: 1.5; }
        .np-lyric-line:hover { color: #888; }
        .np-lyric-line.active { color: white; font-weight: 600; background: rgba(255,85,0,0.12); }
        .np-no-lyrics { text-align: center; color: #666; font-size: 0.85rem; padding: 20px; }

        /* Landscape: art+controls left, lyrics right */
        @media (orientation: landscape) and (min-width: 600px) {
            .np-body { flex-direction: row; }
            .np-left {
                width: 40%; max-width: 360px; max-height: none;
                padding: 14px 20px; gap: 10px;
                justify-content: center; border-right: 1px solid #222;
                flex-shrink: 0; overflow-y: auto;
            }
            .np-art-wrap { width: min(150px, 22vw); height: min(150px, 22vw); }
            .np-art { width: 100%; height: 100%; }
            .np-lyrics-wrap {
                flex: 1; margin: 12px; min-height: 0; min-width: 0;
                overflow-y: auto; align-self: stretch;
            }
        }

        /* Wide screen: inline queue alongside lyrics */
        .np-queue-inline {
            display: none; flex-direction: column;
            border-radius: 10px; border: 1px solid #222;
            overflow: hidden; min-height: 0; min-width: 0;
        }
        .np-queue-inline-hdr {
            padding: 9px 14px; font-size: 0.7rem; color: #666;
            text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid #222; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .np-queue-inline-list { overflow-y: auto; flex: 1; padding: 4px; }
        .np-queue-inline-list::-webkit-scrollbar { width: 3px; }
        .np-queue-inline-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        @media (min-width: 900px) {
            .np-body { flex-direction: row !important; }
            .np-left {
                width: 280px; flex-shrink: 0; max-height: none !important;
                padding: 16px 20px; gap: 12px; justify-content: center;
                border-right: 1px solid #222; overflow-y: auto;
            }
            .np-art-wrap { width: 160px !important; height: 160px !important; }
            .np-lyrics-wrap { flex: 1; margin: 12px; min-height: 0; align-self: stretch; }
            .np-queue-inline { display: flex; width: 44%; max-width: 400px; margin: 12px 12px 12px 0; }
        }

        /* ── Mobile main UI ── */
        .bottom-nav {
            display: none; position: fixed; bottom: var(--player-h); left: 0; right: 0;
            z-index: 89; height: 56px; background: #111; border-top: 1px solid var(--sc-border);
        }
        .bottom-nav-inner { display: flex; height: 100%; }
        .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; color: var(--sc-muted); font-size: 0.6rem; transition: 0.12s; border: none; background: none; font-family: inherit; }
        .bnav-item .icon { font-size: 1.3rem; line-height: 1; }
        .bnav-item.active { color: var(--sc-orange); }
        .bnav-item:hover { color: white; }

        @media (max-width: 640px) {
            .sidebar { display: none; }
            .bottom-nav { display: block; }
            .topnav .logo { font-size: 1rem; }
            .content { padding: 16px; padding-bottom: calc(16px + var(--player-h) + 56px); }
            .content-title { font-size: 1.1rem; margin-bottom: 14px; }
            .now-playing { width: 160px; }
            .player-right { width: auto; }
            .sync-wrap { display: none !important; }
            .track-item { padding: 8px 6px; }
            .track-thumb-wrap { width: 38px; height: 38px; }
            .track-thumb { width: 38px; height: 38px; }
            .player-bar { padding: 0 12px; gap: 12px; }
            .fab { bottom: 156px; }
            .queue-badge { padding: 5px 8px; font-size: 0.75rem; }
            .playlist-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
            .queue-inner { max-height: 80vh; }
        }

        /* Lyrics Search Modal */
        .lrc-modal { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.85); flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 60px; }
        .lrc-modal.open { display: flex; }
        .lrc-box { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; width: min(420px, 92vw); max-height: 70vh; display: flex; flex-direction: column; overflow: hidden; }
        .lrc-header { padding: 14px 16px; border-bottom: 1px solid #2a2a2a; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .lrc-header input { flex: 1; padding: 9px 12px; background: #111; border: 1px solid #333; border-radius: 6px; color: white; font-size: 0.85rem; font-family: inherit; outline: none; }
        .lrc-header input:focus { border-color: var(--sc-orange); }
        .lrc-search-btn { padding: 9px 14px; background: var(--sc-orange); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 0.82rem; white-space: nowrap; }
        .lrc-close-btn { padding: 9px 10px; background: #333; color: #aaa; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; }
        .lrc-results { overflow-y: auto; flex: 1; padding: 8px; }
        .lrc-result-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; border-bottom: 1px solid #2a2a2a; transition: 0.12s; }
        .lrc-result-item:hover { background: rgba(255,85,0,0.1); }
        .lrc-result-title { font-size: 0.88rem; font-weight: 600; }
        .lrc-result-artist { font-size: 0.75rem; color: var(--sc-muted); margin-top: 2px; }
        .lrc-result-item.selected { background: rgba(255,85,0,0.18); border-color: var(--sc-orange); }
        .lrc-footer { padding: 10px 12px; border-top: 1px solid #2a2a2a; display: flex; gap: 8px; flex-shrink: 0; }
        .lrc-footer button { flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 0.85rem; font-family: inherit; }
        .lrc-apply { background: var(--sc-orange); color: white; }
        .lrc-cancel { background: #333; color: #aaa; }
        .lrc-status { padding: 16px; text-align: center; color: var(--sc-muted); font-size: 0.83rem; }

    <div class="login-screen" id="login-screen">

            </div>

            <input type="text" id="login-uid" placeholder="아이디" autocomplete="username"
                   onkeydown="if(event.key==='Enter') document.getElementById('login-pw').focus()">

                   onkeydown="if(event.key==='Enter') doLogin()">
            <button class="login-btn" onclick="doLogin()">로그인</button>

            </div>
            <div class="users-body" id="users-body">

                    <input type="text" id="new-user-nickname" placeholder="닉네임">
                </div>

                    <input type="password" id="new-user-pw" placeholder="비밀번호 (기본: 1234)">
                    <button class="add-user-btn" onclick="createUser()">추가</button>

    <audio id="audio" style="display:none;"></audio>

    <script>
        const PI_URL = (localStorage.getItem('MPL_URL') || '').replace(/\/$/, '');
        let UID = localStorage.getItem('MPL_USER') || '';
        let currentUser = {
            uid: UID,
            nickname: localStorage.getItem('MPL_NICKNAME') || UID,
            role: localStorage.getItem('MPL_ROLE') || 'user'
        };
        const NGROK_HEADERS = { 'ngrok-skip-browser-warning': 'true', 'Content-Type': 'application/json' };
        function apiFetch(url, opts = {}) {
            return fetch(url, { ...opts, headers: { ...NGROK_HEADERS, ...(opts.headers || {}) } });
        }
        const audio = document.getElementById('audio');

        let allFiles = [], playlists = [], trackList = [], currentIdx = 0, currentItem = null;
        let lyrics = [], activeView = 'all', syncOffset = 0;
        let playQueue = [];          // Play Next 대기열
        let playContextList = [];    // 현재 재생 컨텍스트 (뷰 변경과 무관하게 고정)
        let shuffleMode = false;     // 셔플 on/off
        let ctxTrack = null;         // 컨텍스트 메뉴 대상 트랙
        let longPressTimer = null;   // 모바일 꾹누르기 타이머
        let longPressFired = false;
        let prefetchCache = {};      // id → blobUrl 미리 불러온 곡
        let prefetchTriggered = false;
        let playGeneration = 0;

        // --- Auth ---
        function showLoginScreen() {
            document.getElementById('login-screen').classList.add('open');
            // 서버 URL 필드 초기화
            const urlInput = document.getElementById('login-server-url');
            if (urlInput) urlInput.value = localStorage.getItem('MPL_URL') || '';
        }
        function hideLoginScreen() {
            document.getElementById('login-screen').classList.remove('open');
        }
        function saveServerUrl() {
            const v = (document.getElementById('login-server-url').value || '').trim().replace(/\/$/, '');
            localStorage.setItem('MPL_URL', v);
            location.reload();
        }
        async function verifyAndInit() {
            if (!PI_URL) { showLoginScreen(); return; }
            try {
                const r = await apiFetch(`${PI_URL}/api/me?uid=${UID}`);
                const d = await r.json();
                if (!d.success) { showLoginScreen(); return; }
                currentUser = {uid: d.uid, nickname: d.nickname, role: d.role};
                localStorage.setItem('MPL_NICKNAME', d.nickname);
                localStorage.setItem('MPL_ROLE', d.role);
            } catch(e) { /* 오프라인이어도 저장된 정보로 시작 */ }
            initApp();
        }
        async function doLogin() {
            const uid = document.getElementById('login-uid').value.trim();
            const pw = document.getElementById('login-pw').value;
            const errEl = document.getElementById('login-error');
            if (!uid || !pw) { errEl.innerText = '아이디와 비밀번호를 입력하세요.'; return; }
            if (!PI_URL) { errEl.innerText = '먼저 서버 주소를 저장하세요.'; return; }
            errEl.innerText = '';
            try {
                const r = await apiFetch(`${PI_URL}/api/login`, {
                    method: 'POST',
                    body: JSON.stringify({uid, password: pw})
                });
                const d = await r.json();
                if (!r.ok || !d.success) { errEl.innerText = d.error || '로그인 실패'; return; }
                UID = d.uid;
                currentUser = {uid: d.uid, nickname: d.nickname, role: d.role};
                localStorage.setItem('MPL_USER', d.uid);
                localStorage.setItem('MPL_NICKNAME', d.nickname);
                localStorage.setItem('MPL_ROLE', d.role);
                hideLoginScreen();
                initApp();
            } catch(e) {
                errEl.innerText = '서버에 연결할 수 없습니다.';
            }
        }
        function logout() {
            ['MPL_USER','MPL_NICKNAME','MPL_ROLE'].forEach(k => localStorage.removeItem(k));
            UID = ''; currentUser = {uid:'',nickname:'',role:'user'};
            audio.pause(); audio.src = ''; currentItem = null;
            document.getElementById('now-title').innerText = 'No track selected';
            document.getElementById('now-title').style.color = 'var(--sc-muted)';
            showLoginScreen();
        }
        function initApp() {
            const el = document.getElementById('user-name-display');
            if (el) el.innerText = currentUser.nickname || currentUser.uid;
            // admin 전용 UI 표시
            document.querySelectorAll('.admin-only').forEach(e => {

                         ontouchstart='trackTouchStart(event,${JSON.stringify(f).replace(/'/g,"&#39;")})'

        // --- Playback ---
        function playByIdx(i) {
            playSong(trackList[i], i);
            playContextList = [...trackList];
        }

        async function playSong(item, idx) {
            const gen = ++playGeneration;
            currentItem = item;
            currentIdx = idx ?? playContextList.findIndex(f => f.id === item.id);
            document.querySelectorAll('.track-item').forEach(el => el.classList.remove('playing'));
            document.getElementById('track-' + item.id)?.classList.add('playing');
            document.getElementById('now-thumb').src = item.thumbnail || '';
            document.getElementById('now-title').innerText = item.filename;
            document.getElementById('now-title').style.color = '#aaa';
            document.getElementById('now-artist').innerText = item.artist || '—';
            const npArt = document.getElementById('np-art');
            npArt.style.opacity = 1;
            npArt.src = item.thumbnail || '';
            document.getElementById('np-song').innerText = item.filename;
            document.getElementById('np-artist-label').innerText = item.artist || '—';
            document.getElementById('play-btn').innerText = '⏸';
            document.getElementById('np-play-btn').innerText = '⏸';
            lyrics = []; syncOffset = 0; prefetchTriggered = false;
            renderQueueInline();

            audio.pause();
            if (audio._blobUrl) { URL.revokeObjectURL(audio._blobUrl); audio._blobUrl = null; }
            try {
                let blobUrl;
                if (prefetchCache[item.id]) {
                    blobUrl = prefetchCache[item.id];
                    delete prefetchCache[item.id];
                } else {
                    const resp = await apiFetch(item.url);
                    if (gen !== playGeneration) return;
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const blob = await resp.blob();
                    if (gen !== playGeneration) return;
                    blobUrl = URL.createObjectURL(blob);
                }
                if (gen !== playGeneration) { URL.revokeObjectURL(blobUrl); return; }
                audio._blobUrl = blobUrl;
                audio.src = blobUrl;
                document.getElementById('now-title').style.color = 'white';
                audio.play().catch(e => console.error('play:', e));
                setTimeout(prefetchNext, 2000);
            } catch(e) {
                if (gen !== playGeneration) return;
                document.getElementById('now-title').innerText = '로드 실패: ' + e.message;
                document.getElementById('now-title').style.color = '#f87171';
                return;
            }

            if (gen !== playGeneration) return;
            if (item.mpl_url) {
                try {
                    const r = await apiFetch(item.mpl_url);
                    if (gen !== playGeneration) return;
                    const d = await r.json();
                    lyrics = d.synced_lyrics || [];
                } catch(e) {}
            }
            if (gen !== playGeneration) return;
            renderNPLyrics();
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                document.getElementById('play-btn').innerText = '⏸';
                document.getElementById('np-play-btn').innerText = '⏸';
            } else {
                audio.pause();
                document.getElementById('play-btn').innerText = '▶';
                document.getElementById('np-play-btn').innerText = '▶';
            }
        }
        function prevTrack() {
            const list = playContextList.length ? playContextList : trackList;
            const idx = list.findIndex(f => f.id === currentItem?.id);
            if (idx > 0) playSong(list[idx - 1], idx - 1);
        }
        function nextTrack() { playNextTrack(true); }

        function playNextTrack(manual = false) {
            // 1순위: Play Next 큐
            if (playQueue.length > 0) {
                const next = playQueue.shift();
                updateQueueBadge();
                playSong(next);
                return;
            }
            const list = playContextList.length ? playContextList : trackList;
            if (!list.length) return;
            const idx = list.findIndex(f => f.id === currentItem?.id);
            // 2순위: 셔플
            if (shuffleMode) {
                let nextIdx;
                do { nextIdx = Math.floor(Math.random() * list.length); }
                while (list.length > 1 && nextIdx === idx);
                playSong(list[nextIdx], nextIdx);
                return;
            }
            // 3순위: 순차 재생
            const nextIdx = idx + 1;
            if (nextIdx < list.length) {
                playSong(list[nextIdx], nextIdx);
            } else if (!manual) {
                // 끝까지 다 재생 → 첫 곡으로
                playSong(list[0], 0);
            }
        }
        audio.onended = () => playNextTrack();

        function seekTo(e) {
            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }

        function fmtTime(s) {
            if (!s || isNaN(s)) return '0:00';
            return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
        }

        audio.onerror = () => {
            const c = {1:'재생취소',2:'네트워크오류',3:'디코드오류',4:'지원안됨'};
            const msg = c[audio.error?.code] || '알수없음';
            document.getElementById('now-title').innerText = `재생오류: ${msg}`;
            document.getElementById('now-title').style.color = '#f87171';
            console.error('Audio error', audio.error?.code, audio.src);
        };

        audio.ontimeupdate = () => {
            const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
            // 50% 지점에서 prefetch 한번 더 시도 (2초 타이머가 실패했을 경우 보완)
            if (!prefetchTriggered && pct > 50) {
                prefetchTriggered = true;
                prefetchNext();
            }
            document.getElementById('waveform-fill').style.width = pct + '%';
            document.getElementById('cur-time').innerText = fmtTime(audio.currentTime);
            document.getElementById('dur-time').innerText = fmtTime(audio.duration);
            // NP screen
            document.getElementById('np-waveform-fill').style.width = pct + '%';
            document.getElementById('np-cur').innerText = fmtTime(audio.currentTime);
            document.getElementById('np-dur').innerText = fmtTime(audio.duration);
            // Lyrics highlight
            if (lyrics.length) {
                const t = audio.currentTime + syncOffset;
                let active = -1;
                for (let i = 0; i < lyrics.length; i++) {
                    if (lyrics[i].time <= t) active = i; else break;
                }
                const lines = document.querySelectorAll('.np-lyric-line');
                lines.forEach((el, i) => {
                    const wasActive = el.classList.contains('active');
                    el.classList.toggle('active', i === active);
                    if (i === active && !wasActive) {
                        el.scrollIntoView({ block: 'center', behavior: 'smooth' });
                    }
                });
            }
        };

        // --- Context Menu ---
        function showCtxMenu(e, track) {
            e.preventDefault(); e.stopPropagation();
            ctxTrack = track;
            const menu = document.getElementById('ctx-menu');
            menu.style.display = 'block';
            const x = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
            const y = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
            menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
            menu.style.top = Math.min(y, window.innerHeight - 90) + 'px';
        }
        function hideCtxMenu() { document.getElementById('ctx-menu').style.display = 'none'; ctxTrack = null; }
        function ctxPlayNext() {
            if (!ctxTrack) return;
            playQueue.push(ctxTrack);
            updateQueueBadge();
            hideCtxMenu();
        }
        function ctxPlayNow() {
            if (!ctxTrack) return;
            playSong(ctxTrack);
            hideCtxMenu();
        }
        document.addEventListener('click', hideCtxMenu);
        document.addEventListener('touchstart', (e) => {
            if (!e.target.closest('#ctx-menu')) hideCtxMenu();
        });

        // Long press handlers
        function trackTouchStart(e, track) {
            longPressFired = false;
            longPressTimer = setTimeout(() => {
                longPressFired = true;
                showCtxMenu(e, track);
            }, 550);
        }
        function trackTouchEnd() {
            clearTimeout(longPressTimer);
        }
        function trackTouchMove() {
            clearTimeout(longPressTimer);
            longPressFired = false;
        }
        function trackClick(e, idx) {
            if (longPressFired) { longPressFired = false; return; }
            playByIdx(idx);
        }

        // --- Queue ---
        function getUpcomingTracks(count = 8) {
            const result = [];
            // 1) 수동 큐
            result.push(...playQueue.slice(0, count));
            if (result.length >= count) return result;
            // 2) 자동 편성 (컨텍스트 기반)
            const list = playContextList.length ? playContextList : trackList;
            if (!list.length) return result;
            const idx = list.findIndex(f => f.id === currentItem?.id);
            const manualIds = new Set(playQueue.map(f => f.id));
            if (shuffleMode) {
                const pool = list.filter(f => f.id !== currentItem?.id && !manualIds.has(f.id));
                const shuffled = [...pool].sort(() => Math.random() - 0.5);
                result.push(...shuffled.slice(0, count - result.length));
            } else {
                for (let i = idx + 1; result.length < count && i < list.length; i++) {
                    if (!manualIds.has(list[i].id)) result.push(list[i]);
                }
                for (let i = 0; result.length < count && i <= idx; i++) {
                    if (!manualIds.has(list[i].id)) result.push(list[i]);
                }
            }
            return result;
        }

        function updateQueueBadge() {
            const n = playQueue.length;
            const cnt = document.getElementById('queue-count');
            cnt.style.display = n > 0 ? 'flex' : 'none';
            cnt.innerText = n;
            renderQueueInline();
        }

        function inlineQueueItemHTML(t, i, isManual) {
            return `<div class="queue-item">
                ${!isManual ? `<button class="drag-handle" onclick="addAutoToQueue(${i})" title="Play Next에 추가" style="cursor:pointer;">≡</button>` : ''}
                <div class="track-thumb-wrap" style="width:32px;height:32px;flex-shrink:0;">
                    <img class="track-thumb" src="${t.thumbnail||''}" onerror="this.style.opacity=0" style="width:32px;height:32px;">
                </div>
                <div class="queue-item-info">
                    <div class="queue-item-title">${t.filename}</div>
                    <div class="queue-item-artist">${t.artist||'—'}</div>
                </div>
                ${isManual ? `<button class="queue-item-remove" onclick="removeFromQueue(${i})">✕</button>` : ''}
            </div>`;
        }

        function renderQueueInline() {
            const list = document.getElementById('np-queue-inline-list');
            if (!list) return;
            const upcoming = getUpcomingTracks(8);
            let html = '';
            if (playQueue.length) {
                html += `<div style="padding:6px 10px 3px;font-size:0.65rem;color:#555;text-transform:uppercase;letter-spacing:1px;">Play Next</div>`;
                html += playQueue.map((t, i) => inlineQueueItemHTML(t, i, true)).join('');
                html += `<div style="margin:4px 0;border-top:1px solid #222;"></div>`;
            }
            const autoTracks = upcoming.slice(playQueue.length);
            if (autoTracks.length) {
                html += `<div style="padding:6px 10px 3px;font-size:0.65rem;color:#555;text-transform:uppercase;letter-spacing:1px;">자동 재생 예정</div>`;
                html += autoTracks.map((t, i) => inlineQueueItemHTML(t, i, false)).join('');
            }
            if (!html) html = '<div style="padding:20px;text-align:center;color:#444;font-size:0.82rem;">대기열 없음</div>';
            list.innerHTML = html;
        }
        function openQueue() {
            renderQueue();
            document.getElementById('queue-panel').classList.add('open');
        }
        function closeQueue() { document.getElementById('queue-panel').classList.remove('open'); }

        function queueItemHTML(t, i, isManual) {
            const flatIdx = isManual ? i : playQueue.length + i;
            const isPrefetched = !!prefetchCache[t.id];
            return `<div class="queue-item" data-drag-i="${flatIdx}">
                <button class="drag-handle" ontouchstart="startDrag(event,${flatIdx})" onmousedown="startDrag(event,${flatIdx})">≡</button>
                <div class="track-thumb-wrap" style="width:36px;height:36px;flex-shrink:0;">
                    <img class="track-thumb" src="${t.thumbnail||''}" onerror="this.style.opacity=0" style="width:36px;height:36px;">
                </div>
                <div class="queue-item-info">
                    <div class="queue-item-title">${t.filename}${isPrefetched ? ' <span style="color:#4ade80;font-size:0.65rem;">●</span>' : ''}</div>
                    <div class="queue-item-artist">${t.artist||'—'}</div>
                </div>
                ${isManual
                    ? `<button class="queue-item-remove" onclick="removeFromQueue(${i})">✕</button>`
                    : `<button class="queue-item-remove" onclick="addAutoToQueue(${i})" title="Play Next에 고정" style="color:#666;font-size:0.75rem;">＋</button>`}
            </div>`;
        }

        function renderQueue() {
            const list = document.getElementById('queue-list');
            const cnt = document.getElementById('queue-header-count');
            const upcoming = getUpcomingTracks(8);
            cnt.innerText = playQueue.length ? `(수동 ${playQueue.length}곡)` : '';

            let html = '';
            if (playQueue.length) {
                html += `<div style="padding:8px 10px 4px;font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:1px;">Play Next</div>`;
                html += playQueue.map((t, i) => queueItemHTML(t, i, true)).join('');
                html += `<div style="margin:6px 0;border-top:1px solid #222;"></div>`;
            }
            const autoTracks = upcoming.slice(playQueue.length);
            if (autoTracks.length) {
                html += `<div style="padding:8px 10px 4px;font-size:0.7rem;color:#666;text-transform:uppercase;letter-spacing:1px;">자동 재생 예정</div>`;
                html += autoTracks.map((t, i) => queueItemHTML(t, i, false)).join('');
            }
            if (!html) html = '<div style="padding:24px;text-align:center;color:#444;font-size:0.85rem;">재생 목록이 없습니다.</div>';
            list.innerHTML = html;
            renderQueueInline();
        }

        function addAutoToQueue(autoIdx) {
            const upcoming = getUpcomingTracks(8);
            const autoTracks = upcoming.slice(playQueue.length);
            if (autoTracks[autoIdx]) {
                playQueue.push(autoTracks[autoIdx]);
                updateQueueBadge();
                renderQueue();
            }
        }
        function removeFromQueue(i) {
            playQueue.splice(i, 1);
            updateQueueBadge();
            renderQueue();
        }
        function clearQueue() {
            playQueue = [];
            updateQueueBadge();
            renderQueue();
        }
        function shuffleQueue() {
            for (let i = playQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [playQueue[i], playQueue[j]] = [playQueue[j], playQueue[i]];
            }
            renderQueue();
        }

        // --- Drag to reorder queue ---
        let dragIdx = -1, dragOverIdx = -1, dragIsAuto = false;

        function startDrag(e, flatIdx) {
            e.preventDefault();
            dragIdx = flatIdx;
            dragOverIdx = flatIdx;
            dragIsAuto = flatIdx >= playQueue.length;
            document.addEventListener('touchmove', onDragMove, { passive: false });
            document.addEventListener('touchend', onDragEnd);
            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', onDragEnd);
            updateDragVisual();
        }

        function onDragMove(e) {
            if (dragIdx < 0) return;
            e.preventDefault();
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            const items = [...document.querySelectorAll('.queue-inner .queue-item[data-drag-i]')];
            let newOver = items.length ? parseInt(items[items.length - 1].dataset.dragI) + 1 : 0;
            for (let i = 0; i < items.length; i++) {
                const rect = items[i].getBoundingClientRect();
                if (y < rect.top + rect.height / 2) { newOver = parseInt(items[i].dataset.dragI); break; }
            }
            newOver = Math.max(0, newOver);
            if (newOver !== dragOverIdx) { dragOverIdx = newOver; updateDragVisual(); }
        }

        function updateDragVisual() {
            document.querySelectorAll('.queue-inner .queue-item[data-drag-i]').forEach(el => {
                const i = parseInt(el.dataset.dragI);
                el.classList.toggle('drag-source', i === dragIdx);
                el.classList.remove('drag-over-top', 'drag-over-bottom');
                if (i === dragOverIdx && dragOverIdx !== dragIdx) {
                    el.classList.add(dragOverIdx < dragIdx ? 'drag-over-top' : 'drag-over-bottom');
                }
            });
        }

        function onDragEnd() {
            document.removeEventListener('touchmove', onDragMove);
            document.removeEventListener('touchend', onDragEnd);
            document.removeEventListener('mousemove', onDragMove);
            document.removeEventListener('mouseup', onDragEnd);
            if (dragIdx >= 0 && dragOverIdx !== dragIdx) {
                if (dragIsAuto) {
                    // 자동 항목 → Play Next로 승격
                    const upcoming = getUpcomingTracks(8);
                    const autoTracks = upcoming.slice(playQueue.length);
                    const autoLocalIdx = dragIdx - playQueue.length;
                    if (autoLocalIdx >= 0 && autoLocalIdx < autoTracks.length) {
                        const item = autoTracks[autoLocalIdx];
                        const targetPos = Math.min(dragOverIdx, playQueue.length);
                        playQueue.splice(targetPos, 0, item);
                        updateQueueBadge();
                    }
                } else {
                    // 수동 항목 재정렬
                    if (dragIdx < playQueue.length) {
                        const clampedTarget = Math.min(dragOverIdx, playQueue.length);
                        const targetPos = clampedTarget > dragIdx ? clampedTarget - 1 : clampedTarget;
                        const [item] = playQueue.splice(dragIdx, 1);
                        playQueue.splice(Math.min(targetPos, playQueue.length), 0, item);
                        updateQueueBadge();
                    }
                }
            }
            dragIdx = -1; dragOverIdx = -1; dragIsAuto = false;
            renderQueue();
        }

        // --- Prefetch ---
        async function prefetchNext() {
            const upcoming = getUpcomingTracks(2);
            for (const track of upcoming) {
                if (prefetchCache[track.id]) continue;
                try {
                    const resp = await apiFetch(track.url);
                    if (!resp.ok) continue;
                    const blob = await resp.blob();
                    prefetchCache[track.id] = URL.createObjectURL(blob);
                    // 오래된 캐시 정리 (현재+다음 2곡만 유지)
                    const keepIds = new Set([currentItem?.id, ...upcoming.map(f => f.id)]);
                    Object.keys(prefetchCache).forEach(id => {
                        if (!keepIds.has(Number(id))) {
                            URL.revokeObjectURL(prefetchCache[id]);
                            delete prefetchCache[id];
                        }
                    });
                } catch(e) {}
                break; // 한번에 하나씩 prefetch
            }
        }

        // --- Shuffle ---
        function toggleShuffle() {
            shuffleMode = !shuffleMode;
            ['shuffle-btn','np-shuffle-btn'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.toggle('shuffle-indicator', shuffleMode);
            });
        }

        // --- Play Playlist ---
        function playPlaylist(pid, shuffle) {
            const pl = playlists.find(p => p.id === pid);
            if (!pl) return;
            let tracks = allFiles.filter(f => pl.items.includes(f.id));
            if (!tracks.length) return;
            if (shuffle) {
                tracks = [...tracks].sort(() => Math.random() - 0.5);
                if (!shuffleMode) toggleShuffle();
            }
            trackList = tracks;
            playContextList = tracks;
            playSong(tracks[0], 0);
        }

        // --- Now Playing Screen ---
        function openNowPlaying() {
            if (!currentItem) return;
            document.getElementById('np-screen').classList.add('open');
        }
        function closeNowPlaying() {
            document.getElementById('np-screen').classList.remove('open');
        }
        function npSeekTo(e) {
            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        }
        function lrcSeek(t) {
            audio.currentTime = t;
            if (audio.paused) audio.play().catch(() => {});
        }

        function renderNPLyrics() {
            const wrap = document.getElementById('np-lyrics-wrap');
            if (!lyrics.length) {
                wrap.innerHTML = '<div class="np-no-lyrics">가사가 없습니다.</div>';
                return;
            }
            wrap.innerHTML = lyrics.map((l, i) =>
                `<div class="np-lyric-line" data-i="${i}" onclick="lrcSeek(${l.time})">${l.text || '♪'}</div>`
            ).join('');
        }

        // --- Sync ---
        function toggleSync() {
            const sc = document.getElementById('sync-controls');
            const visible = sc.style.display !== 'none';
            sc.style.display = visible ? 'none' : 'flex';
        }
        function toggleNPSync() {
            const bar = document.getElementById('np-sync-bar');
            const btn = document.getElementById('np-sync-toggle');
            const active = bar.classList.toggle('active');
            btn.style.color = active ? 'var(--sc-orange)' : '';
        }
        function applyNPSync(v) {
            syncOffset = Math.round((syncOffset + v) * 100) / 100;
            const label = document.getElementById('np-offset-label');
            if (label) label.innerText = (syncOffset >= 0 ? '+' : '') + syncOffset.toFixed(2) + 's';
            document.getElementById('np-sync-save').style.display = 'inline-block';
            document.getElementById('save-btn').style.display = 'inline-block';
        }
        function adjustSync(v) {
            applyNPSync(v);
        }
        async function saveSync() {
            if (!currentItem) return;
            const adjusted = lyrics.map(l => ({ ...l, time: +(l.time + syncOffset).toFixed(2) }));
            await apiFetch(`${PI_URL}/api/edit`, {
                method: 'POST',
                body: JSON.stringify({ id: currentItem.id, title: currentItem.filename, artist: currentItem.artist, lyrics: adjusted })
            });
            lyrics = adjusted;
            syncOffset = 0;
            document.getElementById('save-btn').style.display = 'none';
            const label = document.getElementById('np-offset-label');
            if (label) label.innerText = '±0.0s';
            const npSave = document.getElementById('np-sync-save');
            if (npSave) npSave.style.display = 'none';
        }

        // --- Playlists ---
        function openCreatePlaylist() {
            document.getElementById('modal-title').innerText = 'New Playlist';
            document.getElementById('modal-body').innerHTML = '<input type="text" id="pName" placeholder="Playlist name...">';
            document.getElementById('modal-ok').onclick = async () => {
                const name = document.getElementById('pName').value.trim();
                if (!name) return;
                await apiFetch(`${PI_URL}/api/playlists`, {
                    method: 'POST',
                    body: JSON.stringify({ uid: UID, name })
                });
                closeModal();
                if (activeView === 'playlist') renderView();
            };
            showModal();
        }

        async function showAddToPlaylist(fileId) {
            document.getElementById('modal-title').innerText = 'Add to Playlist';
            document.getElementById('modal-body').innerHTML = `
                <select id="pSelect">
                    ${playlists.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
                </select>
            `;
            document.getElementById('modal-ok').onclick = async () => {
                const pid = parseInt(document.getElementById('pSelect').value);
                await apiFetch(`${PI_URL}/api/playlists/add`, {
                    method: 'POST',
                    body: JSON.stringify({ uid: UID, playlist_id: pid, file_id: fileId })
                });
                closeModal();
            };
            showModal();
        }

        function showModal() {
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('modal-box').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('modal-box').style.display = 'none';
        }

        // --- Lyrics Search (lrclib.net 직접 호출) ---
        let lrcResults = [], lrcSelectedIdx = -1;

        function parseLrc(lrcStr) {
            const lines = [];
            for (const line of lrcStr.split('\n')) {
                const m = line.trim().match(/^\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
                if (m) {
                    const t = parseInt(m[1]) * 60 + parseFloat(m[2]);
                    const text = m[3].trim();
                    lines.push({ time: Math.round(t * 100) / 100, text });
                }
            }
            return lines;
        }

        function openLyricsSearch() {
            const q = currentItem ? `${currentItem.filename} ${currentItem.artist || ''}`.trim() : '';
            document.getElementById('lrc-query').value = q;
            lrcResults = [];
            lrcSelectedIdx = -1;
            document.getElementById('lrc-results').innerHTML = '<div class="lrc-status">검색어를 입력하세요.</div>';
            document.getElementById('lrc-modal').classList.add('open');
            setTimeout(() => document.getElementById('lrc-query').focus(), 100);
            if (q) doLyricsSearch();
        }

        function closeLyricsSearch() {
            document.getElementById('lrc-modal').classList.remove('open');
        }

        async function doLyricsSearch() {
            const q = document.getElementById('lrc-query').value.trim();
            if (!q) return;
            const resultsEl = document.getElementById('lrc-results');
            resultsEl.innerHTML = '<div class="lrc-status">검색 중...</div>';
            lrcResults = [];
            lrcSelectedIdx = -1;
            try {
                const r = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(q)}`, {
                    headers: { 'Lrclib-Client': 'Tunify/1.0' }
                });
                const data = await r.json();
                lrcResults = data
                    .filter(item => item.syncedLyrics)
                    .slice(0, 8)
                    .map(item => ({
                        title: item.trackName || '',
                        artist: item.artistName || '',
                        album: item.albumName || '',
                        duration: item.duration || 0,
                        lyrics: parseLrc(item.syncedLyrics)
                    }))
                    .filter(r => r.lyrics.length > 0);
                if (lrcResults.length) {
                    lrcSelectedIdx = 0;
                    renderLrcResults();
                } else {
                    resultsEl.innerHTML = '<div class="lrc-status">싱크 가사를 찾지 못했습니다.<br><small>다른 검색어를 시도해 보세요.</small></div>';
                }
            } catch(e) {
                resultsEl.innerHTML = `<div class="lrc-status">오류: ${e.message}</div>`;
            }
        }

        function renderLrcResults() {
            const resultsEl = document.getElementById('lrc-results');
            if (!lrcResults.length) {
                resultsEl.innerHTML = '<div class="lrc-status">결과 없음</div>';
                return;
            }
            resultsEl.innerHTML = lrcResults.map((r, i) => `
                <div class="lrc-result-item ${i === lrcSelectedIdx ? 'selected' : ''}" onclick="selectLrcResult(${i})">
                    <div class="lrc-result-title">${r.title || '(제목 없음)'}</div>
                    <div class="lrc-result-artist">${r.artist || ''}${r.album ? ' · ' + r.album : ''} · ${r.lyrics.length}줄</div>
                </div>
            `).join('');
        }

        function selectLrcResult(idx) {
            lrcSelectedIdx = idx;
            renderLrcResults();
        }

        async function applyLyrics() {
            if (!currentItem || lrcSelectedIdx < 0 || !lrcResults[lrcSelectedIdx]) return;
            const selected = lrcResults[lrcSelectedIdx];
            const newLyrics = selected.lyrics;
            try {
                await apiFetch(`${PI_URL}/api/edit`, {
                    method: 'POST',
                    body: JSON.stringify({
                        id: currentItem.id,
                        title: currentItem.filename,
                        artist: currentItem.artist,
                        lyrics: newLyrics
                    })
                });
                lyrics = newLyrics;
                syncOffset = 0;
                renderNPLyrics();
                closeLyricsSearch();
                // reload file info to update lrc_path reference
                const updatedIdx = allFiles.findIndex(f => f.id === currentItem.id);
                if (updatedIdx >= 0 && !allFiles[updatedIdx].lrc_path) {
                    allFiles[updatedIdx].lrc_path = `/api/media/${currentItem.uid || UID}/mpl_${currentItem.id}.json`;
                    currentItem.mpl_url = PI_URL + allFiles[updatedIdx].lrc_path;
                }
            } catch(e) {
                alert('저장 실패: ' + e.message);
            }
        }

        // --- Delete ---
        async function deleteTrack(id, name) {
            if (!confirm(`"${name}" 삭제할까요?`)) return;
            try {
                await apiFetch(`${PI_URL}/api/files/${id}`, { method: 'DELETE' });
                if (currentItem && String(currentItem.id) === String(id)) {
                    audio.pause();
                    audio.src = '';
                    currentItem = null;
                    document.getElementById('now-title').innerText = 'No track selected';
                    document.getElementById('now-title').style.color = 'var(--sc-muted)';
                    document.getElementById('now-artist').innerText = '—';
                    document.getElementById('now-thumb').src = '';
                }
                renderView();
            } catch(e) { alert('삭제 실패: ' + e.message); }
        }

        window.onload = () => {
            // 서버 URL 필드 초기화
            const urlInput = document.getElementById('login-server-url');
            if (urlInput) urlInput.value = localStorage.getItem('MPL_URL') || '';
            const uid = localStorage.getItem('MPL_USER');
            if (!uid) {
                showLoginScreen();
            } else {
                UID = uid;
                currentUser = {
                    uid,
                    nickname: localStorage.getItem('MPL_NICKNAME') || uid,
                    role: localStorage.getItem('MPL_ROLE') || 'user'
                };
                // 세션 유효성 확인 후 앱 시작
                verifyAndInit();
            }
        };
    </script>
</body>
