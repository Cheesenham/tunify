<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL Pro - Advanced Player (Playlist Mode)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <style>
        :root { --main-color: #444; --primary: #ef4444; }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: #000; color: white; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; transition: 1s; background: radial-gradient(circle at center, var(--main-color) 0%, #000 80%); }
        .player-card { width: 90%; max-width: 450px; text-align: center; }
        .album-art { width: 100%; aspect-ratio: 1/1; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); object-fit: cover; margin-bottom: 25px; transition: 0.5s; background: #1e293b; }
        .info { margin-bottom: 20px; }
        .title { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
        .artist { opacity: 0.6; font-size: 1rem; color: #cbd5e1; }
        .lyrics-container { height: 120px; overflow: hidden; position: relative; margin: 15px 0; mask-image: linear-gradient(to bottom, transparent, #000 20%, #000 80%, transparent); }
        #lyrics-track { transition: transform 0.5s cubic-bezier(0.2, 0, 0.2, 1); }
        .lyric-line { padding: 10px 0; font-size: 1.1rem; opacity: 0.15; transition: 0.3s; }
        .lyric-line.active { opacity: 1; transform: scale(1.1); font-weight: 700; }
        audio { width: 100%; filter: invert(1); opacity: 0.6; margin-top: 15px; }
        .controls-row { display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .btn-pill { background: rgba(255,255,255,0.1); border:none; color:white; padding:10px 18px; border-radius:30px; cursor:pointer; font-size: 0.8rem; transition: 0.3s; }
        .btn-pill:hover { background: rgba(255,255,255,0.2); }
        .btn-save { background: var(--primary); font-weight: 700; }
        .back-btn { position: fixed; top: 20px; left: 20px; color: white; text-decoration: none; opacity: 0.5; }

        /* Playlist & Library UI */
        #listModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:100; overflow-y:auto; padding:30px 20px; backdrop-filter: blur(15px); }
        .tab-row { display:flex; justify-content:center; gap:15px; margin-bottom:25px; }
        .tab { opacity:0.3; cursor:pointer; font-weight:700; font-size:1.2rem; }
        .tab.active { opacity:1; border-bottom:2px solid var(--primary); }
        .file-item { background:rgba(255,255,255,0.05); padding:12px; margin-bottom:10px; border-radius:12px; display:flex; align-items:center; gap:12px; border:1px solid transparent; }
        .item-action { margin-left:auto; cursor:pointer; padding:5px; opacity:0.5; font-size:1.2rem; }
        .item-action:hover { opacity:1; color:var(--primary); }
        
        /* Modals */
        #genericModal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#1e293b; padding:25px; border-radius:20px; z-index:200; width:280px; box-shadow:0 10px 50px rgba(0,0,0,1); }
        #genericModal input { width:100%; padding:12px; margin-bottom:15px; background:#000; color:white; border:1px solid #333; border-radius:10px; box-sizing:border-box; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <a href="/" class="back-btn">← Home</a>

    <div class="player-card">
        <img id="poster" class="album-art" src="" alt="album" crossorigin="anonymous">
        <div class="info">
            <div id="title" class="title">Select from Library</div>
            <div id="artist" class="artist"></div>
        </div>
        <div class="lyrics-container"><div id="lyrics-track"></div></div>
        <audio id="audio" controls autoplay crossorigin="anonymous"></audio>
        <div class="controls-row">
            <button class="btn-pill btn-save" onclick="openList()">📂 Library</button>
            <button class="btn-pill" onclick="openCreatePlaylist()">＋ New Playlist</button>
            <button class="btn-pill" onclick="adjustSync(-0.1)">-0.1s</button>
            <button class="btn-pill" onclick="adjustSync(0.1)">+0.1s</button>
            <button class="btn-pill btn-save" id="save-btn" style="display:none;" onclick="saveSync()">Save Sync</button>
        </div>
    </div>

    <!-- Library & Playlist Modal -->
    <div id="listModal">
        <div class="tab-row">
            <div class="tab active" onclick="setListTab('all')">All Songs</div>
            <div class="tab" onclick="setListTab('playlist')">Playlists</div>
        </div>
        <div id="list-content" style="max-width:500px; margin:0 auto;"></div>
        <button onclick="closeList()" style="display:block; margin:30px auto; padding:12px 40px; border-radius:30px; background:white; color:black; font-weight:700;">Close</button>
    </div>

    <!-- Create/Add Playlist Modal -->
    <div id="genericModal">
        <h3 id="modal-title" style="margin-top:0;">Create Playlist</h3>
        <div id="modal-body"></div>
        <button id="modal-action-btn" style="width:100%; padding:12px; background:var(--primary); border:none; color:white; border-radius:10px; font-weight:700;">OK</button>
        <button onclick="closeGenericModal()" style="width:100%; margin-top:10px; background:none; color:#666; border:none; cursor:pointer;">Cancel</button>
    </div>

    <script>
        const SB_URL = "https://rwmifnnqlbljomwayjzm.supabase.co";
        const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3bWlmbm5xbGJsam9td2F5anptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NzI4NDUsImV4cCI6MjA5MTQ0ODg0NX0.HSbt457Z7XdBTFWMTKfjwq8k1jtw6U8SZxN33LISeCw";
        const supabaseClient = supabase.createClient(SB_URL, SB_ANON);
        const PI_URL = localStorage.getItem('MPL_URL');
        const UID = localStorage.getItem('MPL_USER') || 'admin';
        
        const audio = document.getElementById('audio');
        const poster = document.getElementById('poster');
        let currentItem = null; let lyrics = []; let activeTab = 'all';

        async function openList() {
            document.getElementById('listModal').style.display = 'block';
            renderList();
        }
        function closeList() { document.getElementById('listModal').style.display = 'none'; }
        
        function setListTab(t) {
            activeTab = t;
            document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.innerText.toLowerCase().includes(t)));
            renderList();
        }

        async function renderList() {
            const container = document.getElementById('list-content');
            container.innerHTML = "Loading...";
            
            if(activeTab === 'all') {
                const { data } = await supabaseClient.from('media_files').select('*').order('created_at', {ascending:false});
                container.innerHTML = data.map(f => `
                    <div class="file-item" onclick='playSong(${JSON.stringify(f)})' style="cursor:pointer;">
                        <img src="${f.thumbnail}" style="width:45px; height:45px; border-radius:8px; object-fit:cover;">
                        <div>
                            <div style="font-weight:700; font-size:0.9rem;">${f.filename}</div>
                            <div style="font-size:0.75rem; opacity:0.5;">${f.artist || ""}</div>
                        </div>
                        <div class="item-action" onclick="event.stopPropagation(); showAddToPlaylist(${f.id})">＋</div>
                    </div>
                `).join('');
            } else {
                const { data } = await supabaseClient.from('playlists').select('*').eq('uid', UID);
                container.innerHTML = data.map(p => `
                    <div class="file-item" onclick='openPlaylistItems("${p.id}", "${p.name}")' style="cursor:pointer; background:rgba(239, 68, 68, 0.1);">
                        <div style="font-weight:800; font-size:1.1rem; color:var(--primary);">📁 ${p.name}</div>
                    </div>
                `).join('');
            }
        }

        async function openPlaylistItems(pid, name) {
            const container = document.getElementById('list-content');
            container.innerHTML = `<h3>${name}</h3>`;
            const { data } = await supabaseClient.from('playlist_items').select('media_file_id, media_files(*)').eq('playlist_id', pid);
            container.innerHTML += data.map(d => {
                const f = d.media_files;
                return `
                    <div class="file-item" onclick='playSong(${JSON.stringify(f)})' style="cursor:pointer;">
                        <img src="${f.thumbnail}" style="width:40px; height:40px; border-radius:8px;">
                        <div>${f.filename}</div>
                    </div>
                `;
            }).join('');
            container.innerHTML += `<button onclick="setListTab('playlist')" style="margin-top:20px;">Back to Playlists</button>`;
        }

        function openCreatePlaylist() {
            const modal = document.getElementById('genericModal');
            document.getElementById('modal-title').innerText = "New Playlist";
            document.getElementById('modal-body').innerHTML = `<input type="text" id="pName" placeholder="Playlist Name">`;
            document.getElementById('modal-action-btn').onclick = async () => {
                const name = document.getElementById('pName').value;
                if(!name) return;
                await supabaseClient.from('playlists').insert({name, uid: UID}).execute();
                closeGenericModal();
                alert("Playlist Created!");
            };
            modal.style.display = 'block';
        }

        async function showAddToPlaylist(mid) {
            const { data } = await supabaseClient.from('playlists').select('*').eq('uid', UID);
            const modal = document.getElementById('genericModal');
            document.getElementById('modal-title').innerText = "Add to Playlist";
            document.getElementById('modal-body').innerHTML = `
                <select id="pSelect" style="width:100%; padding:10px; background:#000; color:white; border-radius:10px; margin-bottom:15px;">
                    ${data.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
                </select>
            `;
            document.getElementById('modal-action-btn').onclick = async () => {
                const pid = document.getElementById('pSelect').value;
                await supabaseClient.from('playlist_items').insert({playlist_id: pid, media_file_id: mid}).execute();
                closeGenericModal();
                alert("Added to playlist!");
            };
            modal.style.display = 'block';
        }

        function closeGenericModal() { document.getElementById('genericModal').style.display = 'none'; }

        async function playSong(item) {
            currentItem = item; closeList();
            audio.src = item.url;
            document.getElementById('title').innerText = item.filename;
            document.getElementById('artist').innerText = item.artist || "";
            poster.src = item.thumbnail || "https://via.placeholder.com/500?text=MPL";
            const r = await fetch(item.mpl_url);
            const d = await r.json();
            lyrics = d.synced_lyrics || [];
            renderLyrics();
        }

        function renderLyrics() {
            document.getElementById('lyrics-track').innerHTML = lyrics.map((l, i) => `<div id="lyric-${i}" class="lyric-line">${l.text}</div>`).join('');
        }

        function adjustSync(v) { lyrics = lyrics.map(l => ({...l, time: l.time+v})); document.getElementById('save-btn').style.display = 'inline-block'; }

        async function saveSync() {
            await fetch(`${PI_URL}/api/edit`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: currentItem.id, mpl_url: currentItem.mpl_url, title: currentItem.filename, artist: currentItem.artist, lyrics: lyrics})
            });
            alert("Sync Saved!");
            document.getElementById('save-btn').style.display = 'none';
        }

        audio.ontimeupdate = () => {
            if(!lyrics.length) return;
            const cur = audio.currentTime; let idx = 0;
            for(let i=0; i<lyrics.length; i++) { if(cur >= lyrics[i].time) idx = i; else break; }
            document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`lyric-${idx}`);
            if(activeEl) {
                activeEl.classList.add('active');
                document.getElementById('lyrics-track').style.transform = `translateY(${-idx * 40 + 40}px)`;
            }
        };

        window.onload = openList;
    </script>
</body>
</html>
