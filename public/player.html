<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL Pro - Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <style>
        body {
            background: #111;
            color: white;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
        }

        #playerCard {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            transition: background 0.8s ease;
            position: relative;
            overflow: hidden;
        }

        #albumCover {
            width: 40vh;
            height: 40vh;
            max-width: 300px;
            max-height: 300px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
            border: 3px solid rgba(255, 255, 255, 0.2);
        }

        #audioTitle {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
        }

        #audioArtist {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
            margin-bottom: 40px;
        }

        .lyric-box {
            font-weight: bold;
            width: 100%;
            max-width: 500px;
            height: 200px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .lrc-line {
            opacity: 0.4;
            transition: 0.3s;
        }

        .lrc-current {
            opacity: 1;
            font-size: 1.8rem;
            transform: scale(1.1);
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .bottom-controls {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 30px 30px;
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 100%;
            background: #fff;
            width: 0%;
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .btn-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: 0.2s;
            width: auto;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .ctrl-btn.active {
            color: #667eea;
        }

        .ctrl-btn.play-main {
            font-size: 2.2rem;
            background: rgba(255, 255, 255, 0.1);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        #backBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 10;
        }

        #backBtn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Playlist Panel */
        #playlistToggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 10;
            font-size: 0.9rem;
        }

        #playlistToggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #playlistPanel {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 20;
            display: flex;
            flex-direction: column;
        }

        #playlistPanel.open {
            transform: translateX(0);
        }

        .pl-panel-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pl-panel-header button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            width: auto;
            padding: 5px;
        }

        .pl-track-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .pl-track {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .pl-track:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .pl-track.playing {
            background: rgba(102, 126, 234, 0.3);
            border: 1px solid rgba(102, 126, 234, 0.5);
        }

        .pl-track-num {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            min-width: 20px;
        }

        .pl-track-name {
            flex: 1;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body>

    <button id="backBtn" onclick="window.location.href='/'">← 종료</button>
    <button id="playlistToggle" class="hidden" onclick="togglePlaylistPanel()">📋 목록</button>

    <div id="playerCard">
        <video id="vidPlayer"
            style="width:100%; max-height: 50vh; display:none; border-radius:15px; margin-bottom:20px;"></video>
        <div id="audioView">
            <img id="albumCover" src="" crossorigin="anonymous">
            <h1 id="audioTitle">...</h1>
            <h2 id="audioArtist">...</h2>
            <div class="lyric-box">
                <div id="lrcPrev" class="lrc-line"></div>
                <div id="lrcCurrent" class="lrc-line lrc-current">가사를 불러오는 중...</div>
                <div id="lrcNext" class="lrc-line"></div>
            </div>
        </div>

        <!-- Playlist Side Panel -->
        <div id="playlistPanel">
            <div class="pl-panel-header">
                <span id="plPanelTitle">플레이리스트</span>
                <button onclick="togglePlaylistPanel()">✕</button>
            </div>
            <div class="pl-track-list" id="plTrackList"></div>
        </div>
    </div>

    <audio id="audPlayer"></audio>

    <div class="bottom-controls">
        <div class="progress-container" onclick="seek(event)">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div class="btn-row">
            <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="셔플"
                style="display:none;">🔀</button>
            <button class="ctrl-btn" id="prevBtn" onclick="playPrev()" title="이전곡" style="display:none;">⏮</button>
            <button class="ctrl-btn play-main" onclick="togglePlay()" id="playBtn">⏸</button>
            <button class="ctrl-btn" id="nextBtn" onclick="playNext()" title="다음곡" style="display:none;">⏭</button>
            <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="반복"
                style="display:none;">🔁</button>
        </div>

        <div class="time-row" style="margin-top: 15px;">
            <span id="timeCurr">00:00</span>
            <div style="display:flex; gap:8px; align-items:center; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
                <span style="font-size:0.7rem; color:rgba(255,255,255,0.5); margin-right:5px;">SYNC</span>
                <button onclick="adjustSync(-1)" style="background:none; border:none; color:#fff; cursor:pointer; font-size:0.8rem; padding:2px 5px;">-1s</button>
                <button onclick="adjustSync(-0.1)" style="background:none; border:none; color:#fff; cursor:pointer; font-size:0.8rem; padding:2px 5px;">-0.1s</button>
                <span id="syncStatus" style="font-size:0.8rem; font-weight:bold; min-width:40px; text-align:center;">0.0s</span>
                <button onclick="adjustSync(0.1)" style="background:none; border:none; color:#fff; cursor:pointer; font-size:0.8rem; padding:2px 5px;">+0.1s</button>
                <button onclick="adjustSync(1)" style="background:none; border:none; color:#fff; cursor:pointer; font-size:0.8rem; padding:2px 5px;">+1s</button>
            </div>
            <span id="timeTotal">00:00</span>
        </div>

    </div>

    <script>
        const API_URL = localStorage.getItem('MPL_BASE_URL') || window.location.origin;
        const uid = localStorage.getItem('MPL_ID');
        const params = new URLSearchParams(window.location.search);
        const singleFile = params.get('file');
        const playlistName = params.get('playlist');

        let PLAYER_CORE = null, LYRICS = [], COLOR_THIEF = new ColorThief();
        let lyricOffset = 0;
        function adjustSync(val) { lyricOffset += val; document.getElementById('syncStatus').innerText = (lyricOffset>0?'+':'')+lyricOffset.toFixed(1)+'s'; }

        // Playlist state
        let playlist = [];        // array of filenames
        let currentIndex = 0;
        let shuffleOn = false;
        let repeatOn = false;
        let shuffledOrder = [];

        async function init() {
            if (playlistName) {
                // === Playlist Mode ===
                await loadPlaylist(playlistName);
            } else if (singleFile) {
                // === Single File Mode ===
                const r = await fetch(API_URL + `/api/files?id=${uid}`);
                const d = await r.json();
                playlist = d.files || [];
                currentIndex = playlist.indexOf(singleFile);
                if(currentIndex === -1) currentIndex = 0;
                
                document.getElementById('playlistToggle').classList.remove('hidden');
                document.getElementById('shuffleBtn').style.display = '';
                document.getElementById('prevBtn').style.display = '';
                document.getElementById('nextBtn').style.display = '';
                document.getElementById('repeatBtn').style.display = '';
                
                shuffledOrder = [...Array(playlist.length).keys()];
                if (playlist.length > 0) renderTrackList();
                await loadTrack(singleFile);
            } else {
                location.href = '/';
            }
        }

        // ===== Playlist Loading =====
        async function loadPlaylist(name) {
            const r = await fetch(API_URL + `/api/playlists?id=${uid}`);
            const d = await r.json();
            const pl = (d.playlists || []).find(p => p.name === name);
            if (!pl || pl.tracks.length === 0) {
                alert('플레이리스트가 비어있거나 존재하지 않습니다.');
                location.href = '/';
                return;
            }

            playlist = pl.tracks;
            currentIndex = 0;
            document.getElementById('plPanelTitle').innerText = `🎶 ${pl.name}`;

            // Show playlist controls
            document.getElementById('playlistToggle').classList.remove('hidden');
            document.getElementById('shuffleBtn').style.display = '';
            document.getElementById('prevBtn').style.display = '';
            document.getElementById('nextBtn').style.display = '';
            document.getElementById('repeatBtn').style.display = '';

            shuffledOrder = [...Array(playlist.length).keys()];
            renderTrackList();
            await loadTrack(playlist[currentIndex]);
        }

        function renderTrackList() {
            const container = document.getElementById('plTrackList');
            container.innerHTML = playlist.map((t, i) => `
                <div class="pl-track ${i === currentIndex ? 'playing' : ''}" onclick="jumpToTrack(${i})">
                    <span class="pl-track-num">${i + 1}</span>
                    <span class="pl-track-name">${t.replace('.mpl', '')}</span>
                    ${i === currentIndex ? '<span>▶</span>' : ''}
                </div>
            `).join('');
            // Scroll current into view
            const playing = container.querySelector('.playing');
            if (playing) playing.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        function togglePlaylistPanel() {
            document.getElementById('playlistPanel').classList.toggle('open');
        }

        // ===== Track Loading =====
        async function loadTrack(fileName) {
            // Reset
            LYRICS = [];
            document.getElementById('lrcPrev').innerText = '';
            document.getElementById('lrcCurrent').innerText = '로딩 중...';
            document.getElementById('lrcNext').innerText = '';

            if (PLAYER_CORE) { PLAYER_CORE.pause(); PLAYER_CORE.src = ''; }

            const r = await fetch(API_URL + `/api/download/${uid}/${encodeURIComponent(fileName)}`);
            const zip = await JSZip.loadAsync(await r.blob());

            let meta, lx = "", mF, tF;
            for (let k in zip.files) {
                if (k === 'metadata.json') meta = JSON.parse(await zip.files[k].async("string"));
                if (k.endsWith('.lrc')) lx = await zip.files[k].async("string");
                if (k.startsWith('media.')) mF = k;
                if (k.startsWith('thumb.')) tF = k;
            }

            const mBlob = URL.createObjectURL(await zip.files[mF].async("blob"));
            const tBlob = tF ? URL.createObjectURL(await zip.files[tF].async("blob")) : "";

            document.getElementById('audioTitle').innerText = meta.title;
            document.getElementById('audioArtist').innerText = meta.artist;

            const cov = document.getElementById('albumCover');
            cov.src = tBlob;
            cov.onload = () => {
                try {
                    const c = COLOR_THIEF.getColor(cov);
                    document.getElementById('playerCard').style.background = `radial-gradient(circle at center, rgb(${c[0] + 20},${c[1] + 20},${c[2] + 20}) 0%, #111 100%)`;
                } catch (e) { }
            };

            PLAYER_CORE = meta.type === 'video' ? document.getElementById('vidPlayer') : document.getElementById('audPlayer');
            if (meta.type === 'video') {
                document.getElementById('vidPlayer').style.display = 'block';
                document.getElementById('audioView').style.display = 'none';
            } else {
                document.getElementById('vidPlayer').style.display = 'none';
                document.getElementById('audioView').style.display = '';
            }

            PLAYER_CORE.src = mBlob;
            PLAYER_CORE.play();
            document.getElementById('playBtn').innerText = '⏸';

            // Parse lyrics
            lx.split('\n').forEach(l => {
                const m = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/.exec(l);
                if (m) LYRICS.push({ time: (parseInt(m[1]) * 60 + parseInt(m[2])) * 1000 + parseInt(m[3]) * (m[3].length === 2 ? 10 : 1), text: m[4].trim() });
            });
            LYRICS.sort((a, b) => a.time - b.time);

            // Auto-next on end
            PLAYER_CORE.onended = () => {
                if (playlist.length > 0) {
                    playNext();
                }
            };

            if (playlist.length > 0) renderTrackList();
        }

        // ===== Playback Controls =====
        function togglePlay() {
            if (!PLAYER_CORE) return;
            if (PLAYER_CORE.paused) {
                PLAYER_CORE.play();
                document.getElementById('playBtn').innerText = '⏸';
            } else {
                PLAYER_CORE.pause();
                document.getElementById('playBtn').innerText = '▶';
            }
        }

        function getNextIndex() {
            if (shuffleOn) {
                // Pick random different track
                if (playlist.length <= 1) return 0;
                let next;
                do { next = Math.floor(Math.random() * playlist.length); } while (next === currentIndex);
                return next;
            }
            const next = currentIndex + 1;
            if (next >= playlist.length) {
                return repeatOn ? 0 : -1;
            }
            return next;
        }

        function getPrevIndex() {
            const prev = currentIndex - 1;
            if (prev < 0) {
                return repeatOn ? playlist.length - 1 : 0;
            }
            return prev;
        }

        async function playNext() {
            if (playlist.length === 0) return;
            const next = getNextIndex();
            if (next === -1) return; // End of playlist, no repeat
            currentIndex = next;
            await loadTrack(playlist[currentIndex]);
        }

        async function playPrev() {
            if (playlist.length === 0) return;
            // If more than 3 seconds in, restart current track
            if (PLAYER_CORE && PLAYER_CORE.currentTime > 3) {
                PLAYER_CORE.currentTime = 0;
                return;
            }
            currentIndex = getPrevIndex();
            await loadTrack(playlist[currentIndex]);
        }

        async function jumpToTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            await loadTrack(playlist[currentIndex]);
        }

        function toggleShuffle() {
            shuffleOn = !shuffleOn;
            document.getElementById('shuffleBtn').classList.toggle('active', shuffleOn);
        }

        function toggleRepeat() {
            repeatOn = !repeatOn;
            document.getElementById('repeatBtn').classList.toggle('active', repeatOn);
        }

        // ===== Render Loop =====
        function render() {
            if (PLAYER_CORE && !PLAYER_CORE.paused && PLAYER_CORE.duration) {
                const ms = (PLAYER_CORE.currentTime - lyricOffset) * 1000;
                document.getElementById('progressBar').style.width = (PLAYER_CORE.currentTime / PLAYER_CORE.duration) * 100 + "%";
                document.getElementById('timeCurr').innerText = fmt(PLAYER_CORE.currentTime);
                document.getElementById('timeTotal').innerText = fmt(PLAYER_CORE.duration);

                let cur = -1;
                for (let i = 0; i < LYRICS.length; i++) {
                    if (LYRICS[i].time <= ms) cur = i; else break;
                }
                document.getElementById('lrcPrev').innerText = cur > 0 ? LYRICS[cur - 1].text : "";
                document.getElementById('lrcCurrent').innerText = cur >= 0 ? LYRICS[cur].text : "...";
                document.getElementById('lrcNext').innerText = cur < LYRICS.length - 1 ? LYRICS[cur + 1].text : "";
            }
            requestAnimationFrame(render);
        }

        function fmt(s) { return `${Math.floor(s / 60).toString().padStart(2, '0')}:${Math.floor(s % 60).toString().padStart(2, '0')}`; }
        function seek(e) { if (PLAYER_CORE) PLAYER_CORE.currentTime = (e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.offsetWidth * PLAYER_CORE.duration; }

        requestAnimationFrame(render);
        init();
    </script>
</body>

</html>
