<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL Pro - Cloud Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #4361ee; --accent: #4ade80; --bg: #0f172a; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; font-weight: 800; font-size: 2rem; }
        h1 span { color: var(--accent); }
        .item { background: #1e293b; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .info { flex: 1; overflow: hidden; }
        .name { font-weight: 600; margin-bottom: 3px; }
        .meta { font-size: 0.7rem; opacity: 0.5; }
        .btn-group { display: flex; gap: 8px; }
        button { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn-play { background: var(--primary); color: white; }
        .btn-lyrics { background: #9333ea; color: white; }
        .back-link { display: block; text-align: center; margin-top: 30px; color: #888; text-decoration: none; }
        
        /* Lyrics Modal */
        #lyricsModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; z-index: 100; border: 1px solid var(--primary); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 90; }
        .lyrics-text { white-space: pre-wrap; line-height: 1.8; font-size: 0.95rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cloud <span>Library</span></h1>
        <div id="list">불러오는 중...</div>
        <a href="/" class="back-link">← Hub</a>
    </div>

    <div id="overlay" class="overlay" onclick="closeLyrics()"></div>
    <div id="lyricsModal">
        <h3 style="margin-bottom: 15px; text-align: center;">가사 보기</h3>
        <div id="lyricsBox" class="lyrics-text"></div>
        <button onclick="closeLyrics()" style="margin-top:20px; background:#444;">닫기</button>
    </div>

    <script>
        const SB_URL = "https://rwmifnnqlbljomwayjzm.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3bWlmbm5xbGJsam9td2F5anptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NzI4NDUsImV4cCI6MjA5MTQ0ODg0NX0.HSbt457Z7XdBTFWMTKfjwq8k1jtw6U8SZxN33LISeCw";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function load() {
            const { data, error } = await supabaseClient.from('media_files').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('list');
            if (error || !data) { list.innerText = "로딩 실패"; return; }
            if (data.length === 0) { list.innerText = "저장된 파일이 없습니다."; return; }
            
            list.innerHTML = data.map(f => `
                <div class="item">
                    <div class="info">
                        <div class="name">${f.filename}</div>
                        <div class="meta">${f.type.toUpperCase()} • ${new Date(f.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn-play" onclick="window.open('${f.url}', '_blank')">재생</button>
                        ${f.mpl_url ? `<button class="btn-lyrics" onclick="viewLyrics('${f.mpl_url}')">가사</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function viewLyrics(mplUrl) {
            const box = document.getElementById('lyricsBox');
            box.innerText = "가사를 불러오는 중...";
            document.getElementById('lyricsModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            
            try {
                const r = await fetch(mplUrl);
                const data = await r.json();
                box.innerText = data.lyrics || "등록된 가사가 없습니다.";
            } catch (e) { box.innerText = "가사를 불러올 수 없습니다."; }
        }

        function closeLyrics() {
            document.getElementById('lyricsModal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        load();
    </script>
</body>
</html>
