<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL - Cloud Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { width: 100%; max-width: 500px; background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 20px; text-align: center; color: #4cc9f0; }
        input, select, button { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: none; font-size: 1rem; }
        input, select { background: #0f172a; color: white; }
        button { background: #4361ee; color: white; font-weight: bold; cursor: pointer; }
        .back { text-align: center; display: block; color: #888; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Cloud <span>Maker</span></h1>
        <select id="mode">
            <option value="music">Music (MP3)</option>
            <option value="video">Video (MP4)</option>
        </select>
        <input type="text" id="url" placeholder="YouTube URL">
        <button id="btn" onclick="extract()">Start Extraction (GitHub Worker)</button>
        <a href="/" class="back">← Back to Hub</a>
    </div>

    <script>
        async function extract() {
            const url = document.getElementById('url').value;
            const mode = document.getElementById('mode').value;
            if(!url) return alert("URL을 입력하세요");
            
            const btn = document.getElementById('btn');
            btn.innerText = "GitHub Worker로 신호 전송 중...";
            btn.disabled = true;

            try {
                const r = await fetch('/api/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, mode, uid: 'admin' })
                });
                const res = await r.json();
                alert(res.msg);
            } catch (e) {
                alert("실패: " + e.message);
            } finally {
                btn.innerText = "Start Extraction (GitHub Worker)";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
