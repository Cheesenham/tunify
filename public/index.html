<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL Pro - Home</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <style>
        :root {
            --bg: #f5f7fa;
            --box: #ffffff;
            --text: #333;
            --accent: #4361ee;
            --accent-hover: #3a0ca3;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            transition: background 0.5s ease;
        }

        .card {
            background: var(--box);
            border-radius: 12px;
            padding: 25px;
            max-width: 800px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .hidden {
            display: none !important;
        }

        input,
        select,
        button {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            width: 100%;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .btn-outline:hover {
            background: var(--accent);
            color: white;
        }

        .btn-success {
            background: #2a9d8f;
        }

        .btn-success:hover {
            background: #21867a;
        }

        .btn-danger {
            background: #e63946;
        }

        .btn-danger:hover {
            background: #c5303c;
        }

        .btn-small {
            width: auto;
            padding: 5px 10px;
            margin: 0;
            font-size: 0.85rem;
        }

        .search-item {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
            transition: 0.2s;
        }

        .search-item:hover {
            background: #f8fafc;
            border-color: var(--accent);
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-title h3 {
            margin: 0;
        }

        .playlist-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .playlist-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .playlist-card .pl-name {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .playlist-card .pl-count {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 4px;
        }

        .playlist-card .pl-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .playlist-card .pl-actions button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 5px 12px;
            font-size: 0.8rem;
            width: auto;
        }

        .playlist-card .pl-actions button:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .modal h3 {
            margin-top: 0;
        }

        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-bottom: 6px;
        }

        .track-item .track-name {
            flex: 1;
            font-size: 0.95rem;
        }

        .track-item .track-remove {
            background: #e63946;
            color: white;
            border: none;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            width: auto;
        }
    </style>
</head>

<body>

    <div id="loginSection" class="card">
        <h2 style="text-align: center;">MPL Pro Cloud <span style="font-size: 0.8rem; color: #888;">v4.2</span></h2>
        <div style="margin-bottom: 20px; font-size: 0.9rem; color: #666; text-align: center;">사용자 접속 정보를 입력하여 활성화하세요.
        </div>
        <input type="text" id="apiServer" placeholder="서버 IP 주소 (예: 192.168.0.x:3000)">
        <input type="text" id="userId" placeholder="아이디">
        <input type="password" id="userPw" placeholder="비밀번호">
        <button onclick="login()">접속하기</button>
    </div>

    <div id="hubSection" class="card hidden">
        <div class="header-bar">
            <h2 style="margin: 0;">👋 <span id="userName"></span></h2>
            <div style="display: flex; gap: 10px;">
                <button onclick="window.location.href='/maker'" class="btn-outline" style="width: auto;">🛠 메이커</button>
                <button onclick="logout()" style="width: auto; background: #555;">로그아웃</button>
            </div>
        </div>

        <div class="section-title">
            <h3>🎵 내 보관함</h3>
        </div>
        <div id="fileList"></div>
        <button class="btn-success" onclick="document.getElementById('uploadInput').click()" style="margin-top: 15px;">➕
            파일 업로드 (.mpl)</button>
        <input type="file" id="uploadInput" accept=".mpl,.mplp" onchange="uploadFile(event)" class="hidden">
    </div>

    <div id="playlistSection" class="card hidden">
        <div class="section-title">
            <h3>📋 플레이리스트</h3>
            <button onclick="createPlaylist()" class="btn-outline btn-small">➕ 새 플레이리스트</button>
        </div>
        <div id="playlistList"></div>
    </div>

    <!-- Add to Playlist Modal -->
    <div id="addToPlModal" class="modal-overlay hidden" onclick="if(event.target===this)closeAddModal()">
        <div class="modal">
            <h3>📋 플레이리스트에 추가</h3>
            <div id="addToPlList"></div>
            <button onclick="closeAddModal()" class="btn-outline" style="margin-top:10px;">닫기</button>
        </div>
    </div>

    <!-- Playlist Detail Modal -->
    <div id="plDetailModal" class="modal-overlay hidden" onclick="if(event.target===this)closePlDetail()">
        <div class="modal">
            <h3 id="plDetailTitle">플레이리스트</h3>
            <div id="plDetailTracks"></div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="playCurrentPlaylist()" style="flex:1;">▶ 재생</button>
                <button onclick="closePlDetail()" class="btn-outline" style="flex:1;">닫기</button>
            </div>
        </div>
    </div>

    <script>
        let API_URL = window.location.origin;
        const uid = localStorage.getItem('MPL_ID');
        let allPlaylists = [];
        let currentDetailPlaylist = null;

        window.onload = () => {
            document.getElementById('apiServer').value = window.location.origin;
            if (uid) { showHub(); }
        }

        async function login() {
            let serverIP = document.getElementById('apiServer').value.trim();
            if (!serverIP.startsWith('http')) serverIP = 'http://' + serverIP;
            API_URL = serverIP;

            const v = document.getElementById('userId').value;
            if (!v) return;
            const r = await fetch(API_URL + '/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: v }) });
            if ((await r.json()).success) {
                localStorage.setItem('MPL_ID', v);
                localStorage.setItem('MPL_BASE_URL', API_URL);
                showHub();
            }
        }

        function showHub() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('hubSection').classList.remove('hidden');
            document.getElementById('playlistSection').classList.remove('hidden');
            document.getElementById('userName').innerText = localStorage.getItem('MPL_ID');
            loadFiles();
            loadPlaylists();
        }

        function logout() { localStorage.removeItem('MPL_ID'); location.reload(); }

        // ===== 파일 보관함 =====
        async function loadFiles() {
            const r = await fetch(API_URL + `/api/files?id=${localStorage.getItem('MPL_ID')}`);
            const d = await r.json();
            document.getElementById('fileList').innerHTML = d.files.map(f => `
                <div class="search-item">
                    <div style="font-weight: bold; flex:1; cursor:pointer;" onclick="window.location.href='/player?file=${f}'">🎵 ${f}</div>
                    <button class="btn-outline btn-small" onclick="event.stopPropagation(); showAddToPlaylist('${f}')">📋+</button>
                    <button class="btn-outline btn-small" onclick="event.stopPropagation(); rename('${f}')">수정</button>
                </div>
             `).join('');
        }

        async function rename(old) {
            const n = prompt("새 이름:", old);
            if (n) { await fetch(API_URL + '/api/rename', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: localStorage.getItem('MPL_ID'), oldName: old, newName: n }) }); loadFiles(); }
        }

        async function uploadFile(e) {
            const f = e.target.files[0];
            if (!f) return;
            const fd = new FormData(); fd.append('id', localStorage.getItem('MPL_ID')); fd.append('mplFile', f);
            await fetch(API_URL + '/api/upload', { method: 'POST', body: fd });
            alert("업로드 완료"); loadFiles();
        }

        // ===== 플레이리스트 =====
        async function loadPlaylists() {
            const r = await fetch(API_URL + `/api/playlists?id=${localStorage.getItem('MPL_ID')}`);
            const d = await r.json();
            allPlaylists = d.playlists || [];
            renderPlaylists();
        }

        function renderPlaylists() {
            const container = document.getElementById('playlistList');
            if (allPlaylists.length === 0) {
                container.innerHTML = '<div style="color:#999; text-align:center; padding:20px;">플레이리스트가 없습니다. 새로 만들어 보세요!</div>';
                return;
            }
            container.innerHTML = allPlaylists.map(pl => `
                <div class="playlist-card" onclick="showPlaylistDetail('${pl.name}')">
                    <div class="pl-name">🎶 ${pl.name}</div>
                    <div class="pl-count">${pl.tracks.length}곡</div>
                    <div class="pl-actions">
                        <button onclick="event.stopPropagation(); playPlaylist('${pl.name}')">▶ 재생</button>
                        <button onclick="event.stopPropagation(); deletePlaylist('${pl.name}')">🗑 삭제</button>
                    </div>
                </div>
            `).join('');
        }

        async function createPlaylist() {
            const name = prompt("플레이리스트 이름:");
            if (!name) return;
            const r = await fetch(API_URL + '/api/playlist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: localStorage.getItem('MPL_ID'), name })
            });
            const d = await r.json();
            if (d.success) loadPlaylists();
            else alert(d.error);
        }

        async function deletePlaylist(name) {
            if (!confirm(`"${name}" 플레이리스트를 삭제하시겠습니까?`)) return;
            await fetch(API_URL + '/api/playlist', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: localStorage.getItem('MPL_ID'), name })
            });
            loadPlaylists();
        }

        function playPlaylist(name) {
            window.location.href = `/player?playlist=${encodeURIComponent(name)}`;
        }

        // ===== 곡을 플레이리스트에 추가 모달 =====
        let addingTrack = '';

        function showAddToPlaylist(track) {
            addingTrack = track;
            const modal = document.getElementById('addToPlModal');
            const list = document.getElementById('addToPlList');
            if (allPlaylists.length === 0) {
                list.innerHTML = '<div style="color:#999; padding:10px;">플레이리스트가 없습니다. 먼저 만들어주세요.</div>';
            } else {
                list.innerHTML = allPlaylists.map(pl => {
                    const already = pl.tracks.includes(track);
                    return `<div class="search-item" onclick="${already ? '' : `addTrackToPlaylist('${pl.name}')`}" style="${already ? 'opacity:0.5;cursor:default;' : ''}">
                        <div style="flex:1; font-weight:bold;">🎶 ${pl.name} <span style="font-weight:normal; color:#888;">(${pl.tracks.length}곡)</span></div>
                        <span>${already ? '✅ 추가됨' : '➕'}</span>
                    </div>`;
                }).join('');
            }
            modal.classList.remove('hidden');
        }

        function closeAddModal() {
            document.getElementById('addToPlModal').classList.add('hidden');
        }

        async function addTrackToPlaylist(plName) {
            const pl = allPlaylists.find(p => p.name === plName);
            if (!pl) return;
            const newTracks = [...pl.tracks, addingTrack];
            await fetch(API_URL + '/api/playlist', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: localStorage.getItem('MPL_ID'), name: plName, tracks: newTracks })
            });
            await loadPlaylists();
            showAddToPlaylist(addingTrack);
        }

        // ===== 플레이리스트 상세 모달 =====
        function showPlaylistDetail(name) {
            const pl = allPlaylists.find(p => p.name === name);
            if (!pl) return;
            currentDetailPlaylist = name;
            document.getElementById('plDetailTitle').innerText = `🎶 ${pl.name}`;
            const container = document.getElementById('plDetailTracks');
            if (pl.tracks.length === 0) {
                container.innerHTML = '<div style="color:#999; padding:15px; text-align:center;">곡이 없습니다. 보관함에서 📋+ 버튼으로 추가하세요.</div>';
            } else {
                container.innerHTML = pl.tracks.map((t, i) => `
                    <div class="track-item">
                        <span style="color:#999; margin-right:10px;">${i + 1}</span>
                        <span class="track-name">🎵 ${t}</span>
                        <button class="track-remove" onclick="removeTrack('${name}', ${i})">✕</button>
                    </div>
                `).join('');
            }
            document.getElementById('plDetailModal').classList.remove('hidden');
        }

        function closePlDetail() {
            document.getElementById('plDetailModal').classList.add('hidden');
        }

        function playCurrentPlaylist() {
            if (currentDetailPlaylist) {
                playPlaylist(currentDetailPlaylist);
            }
        }

        async function removeTrack(plName, index) {
            const pl = allPlaylists.find(p => p.name === plName);
            if (!pl) return;
            const newTracks = pl.tracks.filter((_, i) => i !== index);
            await fetch(API_URL + '/api/playlist', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: localStorage.getItem('MPL_ID'), name: plName, tracks: newTracks })
            });
            await loadPlaylists();
            showPlaylistDetail(plName);
        }
    </script>
</body>

</html>
