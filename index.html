<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunify</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #1a1a1a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .card { width: 100%; max-width: 400px; padding: 40px; background: #222; border: 1px solid #2a2a2a; border-radius: 12px; }

        .logo { text-align: center; margin-bottom: 32px; }
        .logo-text { font-size: 2rem; font-weight: 700; letter-spacing: -1px; }
        .logo-text span { color: #ff5500; }
        .logo-sub { font-size: 0.8rem; color: #555; margin-top: 4px; }

        .field { margin-bottom: 16px; }
        label { display: block; font-size: 0.75rem; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.8px; }
        input { width: 100%; padding: 11px 14px; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: white; font-size: 0.9rem; font-family: inherit; outline: none; transition: 0.15s; }
        input:focus { border-color: #ff5500; }

        .connect-btn { width: 100%; padding: 13px; background: #ff5500; color: white; border: none; border-radius: 6px; font-weight: 700; font-size: 0.95rem; cursor: pointer; font-family: inherit; transition: 0.15s; margin-top: 8px; }
        .connect-btn:hover:not(:disabled) { background: #e04d00; }
        .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .hub { display: none; }
        .hub-title { text-align: center; margin-bottom: 8px; }
        .hub-conn { text-align: center; font-size: 0.75rem; color: #4ade80; margin-bottom: 28px; }
        .hub-url { color: #666; font-size: 0.72rem; margin-top: 2px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .menu-item { background: #2a2a2a; border: 1px solid #333; padding: 24px 16px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.15s; }
        .menu-item:hover { border-color: #ff5500; background: rgba(255,85,0,0.08); transform: translateY(-2px); }
        .menu-item .icon { font-size: 2rem; margin-bottom: 8px; }
        .menu-item strong { font-size: 0.9rem; display: block; }

        .logout-btn { width: 100%; padding: 11px; background: none; border: 1px solid #333; color: #666; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.85rem; transition: 0.15s; }
        .logout-btn:hover { border-color: #555; color: #aaa; }

        .err-box { margin-top: 12px; display: none; }
        .err-msg { color: #ef4444; font-size: 0.82rem; text-align: center; margin-bottom: 6px; }
        .log-toggle { width: 100%; background: none; border: 1px solid #2a2a2a; color: #555; border-radius: 6px; padding: 7px; font-size: 0.75rem; cursor: pointer; font-family: inherit; transition: 0.15s; }
        .log-toggle:hover { color: #888; border-color: #444; }
        .log-panel { background: #111; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px; margin-top: 8px; display: none; max-height: 200px; overflow-y: auto; }
        .log-line { font-size: 0.72rem; font-family: monospace; padding: 2px 0; border-bottom: 1px solid #1a1a1a; word-break: break-all; }
        .log-line.info { color: #60a5fa; }
        .log-line.ok { color: #4ade80; }
        .log-line.err { color: #f87171; }
        .log-line.warn { color: #fbbf24; }
    </style>
</head>
<body>

    <!-- 로그인 -->
    <div class="card" id="loginCard">
        <div class="logo">
            <div class="logo-text">Tun<span>ify</span></div>
            <div class="logo-sub">Pi Music Server</div>
        </div>

        <div class="field">
            <label>Pi Server Address</label>
            <input type="text" id="piUrl" value="https://stiffly-rogue-parkway.ngrok-free.dev">
        </div>
        <div class="field">
            <label>User ID</label>
            <input type="text" id="userId" value="admin">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="userPw" value="1234" onkeydown="if(event.key==='Enter') login()">
        </div>
        <button class="connect-btn" id="conn-btn" onclick="login()">Connect</button>

        <div class="err-box" id="err-box">
            <div class="err-msg" id="err-msg"></div>
            <button class="log-toggle" onclick="toggleLog()">로그 보기 ▾</button>
            <div class="log-panel" id="log-panel"></div>
        </div>
    </div>

    <!-- 허브 -->
    <div class="card hub" id="hubCard">
        <div class="hub-title">
            <h2>Tun<span style="color:#ff5500;">ify</span></h2>
        </div>
        <div class="hub-conn">
            ● Connected
            <div class="hub-url" id="hub-url"></div>
        </div>
        <div class="menu-grid">
            <div class="menu-item" onclick="location.href='/maker.html'">
                <div class="icon">🎬</div>
                <strong>Maker</strong>
            </div>
            <div class="menu-item" onclick="location.href='/player.html'">
                <div class="icon">🎵</div>
                <strong>Player</strong>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()">Disconnect</button>
    </div>

    <script>
        const logs = [];

        function addLog(msg, type = 'info') {
            const ts = new Date().toLocaleTimeString('ko-KR', { hour12: false });
            logs.push({ ts, msg, type });
            const panel = document.getElementById('log-panel');
            if (panel.style.display !== 'none') renderLog();
        }

        function renderLog() {
            const panel = document.getElementById('log-panel');
            panel.innerHTML = logs.map(l =>
                `<div class="log-line ${l.type}">[${l.ts}] ${l.msg}</div>`
            ).join('');
            panel.scrollTop = panel.scrollHeight;
        }

        function toggleLog() {
            const panel = document.getElementById('log-panel');
            const btn = document.querySelector('.log-toggle');
            const visible = panel.style.display !== 'none';
            panel.style.display = visible ? 'none' : 'block';
            btn.innerText = visible ? '로그 보기 ▾' : '로그 닫기 ▴';
            if (!visible) renderLog();
        }

        async function login() {
            let url = document.getElementById('piUrl').value.trim();
            const id = document.getElementById('userId').value.trim();
            const pw = document.getElementById('userPw').value;
            const btn = document.getElementById('conn-btn');

            if (!url) { showErr('서버 주소를 입력하세요.'); return; }

            if (!url.startsWith('http')) url = 'https://' + url;
            if (url.endsWith('/')) url = url.slice(0, -1);

            if (id !== 'admin' || pw !== '1234') {
                showErr('아이디 또는 비밀번호가 틀렸습니다.');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Connecting...';
            addLog(`접속 시도: ${url}/api/status`, 'info');

            try {
                addLog('fetch 요청 전송 중...', 'info');
                const r = await fetch(`${url}/api/status`, {
                    signal: AbortSignal.timeout(8000),
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                addLog(`HTTP 응답: ${r.status} ${r.statusText}`, r.ok ? 'ok' : 'err');

                const text = await r.text();
                addLog(`응답 내용: ${text.slice(0, 200)}`, 'info');

                const d = JSON.parse(text);
                if (!d.success) throw new Error('success: false');

                addLog(`서버 상태: ${d.msg} | ffmpeg: ${d.ffmpeg}`, 'ok');
                localStorage.setItem('MPL_USER', id);
                localStorage.setItem('MPL_URL', url);
                showHub(url);

            } catch(e) {
                addLog(`오류: ${e.name} - ${e.message}`, 'err');
                if (e.name === 'TimeoutError') {
                    showErr('연결 시간 초과 (8초). 주소를 확인하세요.');
                } else if (e.name === 'TypeError') {
                    showErr('CORS 또는 네트워크 오류. 로그 보기를 확인하세요.');
                } else {
                    showErr(`연결 실패: ${e.message}`);
                }
                btn.disabled = false;
                btn.innerText = 'Connect';
            }
        }

        function showHub(url) {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('hubCard').style.display = 'block';
            document.getElementById('hub-url').innerText = url;
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function showErr(msg) {
            document.getElementById('err-msg').innerText = msg;
            document.getElementById('err-box').style.display = 'block';
        }

        window.onload = () => {
            if (localStorage.getItem('MPL_USER')) {
                showHub(localStorage.getItem('MPL_URL') || '');
            }
        };
    </script>
</body>
</html>
