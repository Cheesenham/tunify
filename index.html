<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL PRO - Cloud Native</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #4361ee;
            --accent: #4cc9f0;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }
        * { margin:0; padding:0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        h1 { text-align: center; margin-bottom: 30px; font-weight: 800; font-size: 2.5rem; letter-spacing: -1px; }
        h1 span { color: var(--accent); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #94a3b8; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #0f172a; color: white; font-size: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { background: #3f37c9; transform: translateY(-2px); }
        .hidden { display: none; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item { background: #334155; padding: 25px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .menu-item:hover { background: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .menu-item span { font-size: 3rem; display: block; margin-bottom: 10px; }
        .menu-item strong { display: block; font-size: 1.2rem; }
        .sub-text { font-size: 0.7rem; opacity: 0.6; margin-top: 5px; }
        .status-badge { text-align: center; margin-bottom: 20px; font-size: 0.8rem; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 10px; color: #4ade80; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginSection">
            <h1>MPL <span>PRO</span></h1>
            <div class="input-group">
                <label>User ID</label>
                <input type="text" id="userId" value="admin">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="userPw" value="1234">
            </div>
            <button onclick="login()">Connect to Cloud</button>
        </div>

        <div id="hubSection" class="hidden">
            <div class="status-badge">🟢 Cloud Infrastructure Active (Serverless)</div>
            <h1>Control <span>Hub</span></h1>
            
            <div class="menu-grid">
                <div class="menu-item" onclick="location.href='/maker.html'">
                    <span>🎬</span>
                    <strong>Maker</strong>
                    <div class="sub-text">GitHub Cloud Extract</div>
                </div>
                <div class="menu-item" onclick="location.href='/player.html'">
                    <span>🎵</span>
                    <strong>Player</strong>
                    <div class="sub-text">Supabase Storage</div>
                </div>
                <div class="menu-item" onclick="alert('준비 중입니다.')">
                    <span>⚙️</span>
                    <strong>Admin</strong>
                    <div class="sub-text">Settings</div>
                </div>
                <div class="menu-item" style="background: #e11d48;" onclick="logout()">
                    <span>🚪</span>
                    <strong>Logout</strong>
                    <div class="sub-text">Exit System</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const id = document.getElementById('userId').value;
            const pw = document.getElementById('userPw').value;
            if(id === 'admin' && pw === '1234') {
                localStorage.setItem('MPL_USER', id);
                showHub();
            } else alert("Credentials failed");
        }

        function showHub() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('hubSection').classList.remove('hidden');
        }

        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => { if(localStorage.getItem('MPL_USER')) showHub(); }
    </script>
</body>
</html>
