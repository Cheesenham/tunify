<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL PRO - Cloud Native</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }
        * { margin:0; padding:0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .glass { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; width: 100%; max-width: 450px; }
        h1 { text-align: center; font-size: 2.5rem; margin-bottom: 30px; }
        h1 span { color: var(--primary); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
        input { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 1rem; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .hidden { display: none; }
        .file-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        #hubSection { max-height: 90vh; overflow-y: auto; width: 100%; }
        select { width: 100%; padding: 10px; background: #334155; color: white; border: none; border-radius: 8px; margin-bottom: 10px; font-family: inherit; }
    </style>
</head>
<body>

    <div id="loginSection" class="glass">
        <h1>MPL <span>PRO</span></h1>
        <div class="input-group">
            <label>User ID</label>
            <input type="text" id="userId" placeholder="admin" value="admin">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="userPw" placeholder="1234" value="1234">
        </div>
        <button onclick="login()">Enter Cloud Hub</button>
    </div>

    <div id="hubSection" class="glass hidden">
        <h1 style="font-size: 1.8rem;">Cloud <span>Storage</span></h1>
        
        <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
            <select id="extractMode">
                <option value="music">Music (MP3)</option>
                <option value="video">Video (MP4)</option>
            </select>
            <input type="text" id="extractUrl" placeholder="YouTube URL" style="margin-bottom: 15px;">
            <button id="extractBtn" onclick="triggerExtraction()">Request Extraction</button>
        </div>

        <div id="fileContainer">
            <p style="text-align: center; opacity: 0.5;">Loading files...</p>
        </div>

        <button onclick="logout()" style="background: #ef4444; margin-top: 20px;">Logout</button>
    </div>

    <script>
        const SB_URL = "https://rwmifnnqlbljomwayjzm.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3bWlmbm5xbGJsam9td2F5anptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NzI4NDUsImV4cCI6MjA5MTQ0ODg0NX0.HSbt457Z7XdBTFWMTKfjwq8k1jtw6U8SZxN33LISeCw";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function login() {
            const id = document.getElementById('userId').value;
            const pw = document.getElementById('userPw').value;
            if(id === 'admin' && pw === '1234') {
                localStorage.setItem('MPL_USER', id);
                showHub();
            } else alert("Invalid Credentials");
        }

        async function triggerExtraction() {
            const url = document.getElementById('extractUrl').value;
            const mode = document.getElementById('extractMode').value;
            if(!url) return alert("Enter URL");
            
            const btn = document.getElementById('extractBtn');
            btn.innerText = "GitHub Cloud Working..."; btn.disabled = true;

            try {
                const r = await fetch('/api/extract', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, mode, uid: 'admin' })
                });
                const res = await r.json();
                alert(res.msg);
                document.getElementById('extractUrl').value = "";
            } catch (e) { alert("Failed: " + e.message); }
            finally { btn.innerText = "Request Extraction"; btn.disabled = false; }
        }

        async function loadFiles() {
            const { data, error } = await supabaseClient.from('media_files').select('*').order('created_at', { ascending: false });
            if(error) return console.error(error);
            const container = document.getElementById('fileContainer');
            if(!data || data.length === 0) { container.innerHTML = "<p style='text-align:center;'>No files found.</p>"; return; }
            container.innerHTML = data.map(f => `
                <div class="file-item">
                    <div style="flex:1; overflow:hidden;">
                        <div style="font-weight: bold; font-size: 0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${f.filename}</div>
                        <div style="font-size: 0.7rem; opacity: 0.5;">${f.type.toUpperCase()} • ${new Date(f.created_at).toLocaleDateString()}</div>
                    </div>
                    <button onclick="window.open('${f.url}', '_blank')" style="width: auto; padding: 5px 15px; font-size: 0.8rem; margin:0;">Play</button>
                </div>
            `).join('');
        }

        function showHub() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('hubSection').classList.remove('hidden');
            loadFiles();
            setInterval(loadFiles, 15000);
        }

        function logout() { localStorage.removeItem('MPL_USER'); location.reload(); }

        window.onload = () => { if(localStorage.getItem('MPL_USER')) showHub(); }
    </script>
</body>
</html>
