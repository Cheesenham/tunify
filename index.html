<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL PRO - Raspberry Pi Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ef4444; --accent: #f87171; --bg: #0f172a; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; width: 100%; max-width: 450px; }
        h1 { text-align: center; font-weight: 800; font-size: 2.5rem; margin-bottom: 30px; }
        h1 span { color: var(--primary); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
        input { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 1rem; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: var(--accent); transform: translateY(-2px); }
        .hidden { display: none; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { background: var(--primary); transform: translateY(-5px); }
        .menu-item span { font-size: 2.5rem; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="loginSection" class="glass">
        <h1>MPL <span>PI</span></h1>
        <div class="input-group">
            <label>Pi Server Address</label>
            <input type="text" id="piUrl" placeholder="https://xxx.trycloudflare.com">
        </div>
        <div class="input-group">
            <label>User ID</label>
            <input type="text" id="userId" value="admin">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="userPw" value="1234">
        </div>
        <button onclick="login()">Connect to Pi</button>
    </div>

    <div id="hubSection" class="glass hidden">
        <h1>Control <span>Hub</span></h1>
        <div style="text-align: center; color: #4ade80; font-size: 0.8rem; margin-bottom: 20px;">Raspberry Pi 4B Connected</div>
        <div class="menu-grid">
            <div class="menu-item" onclick="location.href='/maker.html'">
                <span>🎬</span>
                <strong>Maker</strong>
            </div>
            <div class="menu-item" onclick="location.href='/player.html'">
                <span>🎵</span>
                <strong>Player</strong>
            </div>
            <div class="menu-item" style="background: #ef4444; grid-column: span 2;" onclick="logout()">
                <strong>Logout / Exit</strong>
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const piUrl = document.getElementById('piUrl').value;
            const id = document.getElementById('userId').value;
            const pw = document.getElementById('userPw').value;
            
            if(!piUrl.startsWith('http')) return alert("올바른 서버 주소를 입력하세요.");
            
            if(id === 'admin' && pw === '1234') {
                localStorage.setItem('MPL_USER', id);
                localStorage.setItem('MPL_URL', piUrl);
                showHub();
            } else alert("로그인 실패");
        }

        function showHub() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('hubSection').classList.remove('hidden');
        }

        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => { if(localStorage.getItem('MPL_USER')) showHub(); }
    </script>
</body>
</html>
