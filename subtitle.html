<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자막 에디터</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f13;color:#e8e8e8;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 상단 바 */
.topbar{height:48px;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.topbar .logo{color:#a78bfa;font-weight:700;font-size:1rem;cursor:pointer}
.topbar .sep{color:#444}
.topbar .fname{font-size:.85rem;color:#aaa;max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .spacer{flex:1}
.top-btn{background:#1e1e2a;border:1px solid #3a3a50;color:#ccc;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.78rem;transition:.12s}
.top-btn:hover{border-color:#a78bfa;color:#fff}
.top-btn.primary{background:#7c3aed;border-color:#7c3aed;color:#fff}
.top-btn.primary:hover{background:#6d28d9}
.autosave-indicator{font-size:.72rem;color:#555;margin-left:4px}

/* 메인 레이아웃 */
.layout{display:flex;flex:1;overflow:hidden;gap:0}

/* 왼쪽: 영상 + 타임라인 */
.left-panel{display:flex;flex-direction:column;width:55%;min-width:320px;border-right:1px solid #222;overflow:hidden}
.video-wrap{background:#000;position:relative;flex-shrink:0}
.video-wrap video{width:100%;display:block;max-height:42vh}
.video-wrap .vtt-overlay{position:absolute;bottom:40px;left:0;right:0;text-align:center;pointer-events:none;font-size:1.1rem;line-height:1.5;padding:0 12px;text-shadow:1px 1px 3px #000,-1px -1px 3px #000}
.timeline{flex:1;overflow-y:auto;padding:8px}
.tl-header{display:flex;align-items:center;gap:8px;padding:6px 4px 10px;border-bottom:1px solid #222;margin-bottom:6px}
.tl-header span{font-size:.8rem;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.tl-header .tl-add{margin-left:auto;background:#7c3aed;border:none;color:#fff;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:.78rem}
.cue-row{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:.1s;margin-bottom:3px}
.cue-row:hover{background:#1a1a22;border-color:#2a2a35}
.cue-row.active{background:#1e1635;border-color:#7c3aed}
.cue-time{font-size:.72rem;color:#666;white-space:nowrap;min-width:120px}
.cue-text{flex:1;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cue-del{background:none;border:none;color:#555;cursor:pointer;font-size:.9rem;padding:2px 4px;border-radius:4px}
.cue-del:hover{color:#f87171}

/* 오른쪽: 에디터 */
.right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:14px}
.editor-section{margin-bottom:14px}
.editor-label{font-size:.72rem;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.time-row{display:flex;gap:8px;align-items:center}
.time-input{background:#111118;border:1px solid #333;border-radius:6px;color:#eee;padding:6px 10px;font-size:.88rem;font-family:inherit;width:110px;outline:none}
.time-input:focus{border-color:#7c3aed}
.time-sep{color:#444;font-size:.9rem}
.time-now-btn{background:#1e1e2a;border:1px solid #333;color:#aaa;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.72rem}
.time-now-btn:hover{border-color:#a78bfa;color:#fff}

/* 서식 툴바 */
.toolbar{display:flex;gap:4px;padding:6px 8px;background:#111118;border:1px solid #333;border-radius:7px 7px 0 0;border-bottom:none}
.tb-btn{background:none;border:1px solid #2a2a35;color:#aaa;padding:4px 9px;border-radius:5px;cursor:pointer;font-size:.8rem;transition:.1s}
.tb-btn:hover{border-color:#7c3aed;color:#fff}
.tb-btn.active{background:#7c3aed;border-color:#7c3aed;color:#fff}
.tb-sep{width:1px;background:#2a2a35;margin:2px 3px}
.color-swatch{width:20px;height:20px;border-radius:4px;border:2px solid #444;cursor:pointer;flex-shrink:0}
.color-swatch:hover{border-color:#fff}

/* 에디터 텍스트 */
.cue-editor{background:#111118;border:1px solid #333;border-radius:0 0 7px 7px;padding:10px;min-height:80px;color:#eee;font-size:.9rem;line-height:1.6;outline:none;white-space:pre-wrap;word-break:break-word}
.cue-editor:focus{border-color:#7c3aed}
.cue-editor b{font-weight:700}

/* 프리뷰 */
.preview-box{background:#111118;border:1px solid #2a2a35;border-radius:7px;padding:8px 12px;min-height:36px;font-size:.88rem;line-height:1.6;color:#eee;margin-top:6px;word-break:break-word}
.preview-box b{font-weight:700}

/* 익스포트 모달 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#1a1a22;border:1px solid #3a3a50;border-radius:12px;padding:22px;width:90%;max-width:360px}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:14px}
.modal-btns{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.m-btn{padding:10px;border-radius:8px;border:1px solid #3a3a50;background:#111118;color:#eee;cursor:pointer;font-size:.88rem;font-family:inherit;text-align:left;transition:.12s}
.m-btn:hover{border-color:#a78bfa;background:#1e1635}
.m-btn .m-btn-sub{font-size:.72rem;color:#666;display:block;margin-top:2px}
.modal-cancel{margin-top:8px;width:100%;padding:8px;background:none;border:1px solid #333;border-radius:8px;color:#aaa;cursor:pointer;font-size:.82rem;font-family:inherit}

/* 빈 상태 */
.empty-cue{color:#444;text-align:center;padding:30px;font-size:.85rem}

@media(max-width:700px){
  .left-panel{width:100%;border-right:none;border-bottom:1px solid #222}
  .layout{flex-direction:column}
}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo" onclick="history.back()">← 웹하드</span>
  <span class="sep">›</span>
  <span class="fname" id="fname-label">자막 에디터</span>
  <div class="spacer"></div>
  <span class="autosave-indicator" id="autosave-label">●</span>
  <button class="top-btn" onclick="openExport()">💾 내보내기</button>
</div>

<div class="layout">
  <!-- 왼쪽: 영상 + 자막 목록 -->
  <div class="left-panel">
    <div class="video-wrap" id="video-wrap">
      <video id="preview-video" controls></video>
      <div class="vtt-overlay" id="vtt-overlay"></div>
    </div>
    <div class="timeline">
      <div class="tl-header">
        <span>자막 목록 (<span id="cue-count">0</span>)</span>
        <button class="tl-add" onclick="addCueAtCurrent()">＋ 현재 시간에 추가</button>
      </div>
      <div id="cue-list"></div>
    </div>
  </div>

  <!-- 오른쪽: 에디터 -->
  <div class="right-panel">
    <div id="no-selection" style="color:#444;text-align:center;padding:40px 0;font-size:.88rem">
      자막 항목을 선택하거나 ＋ 버튼으로 추가하세요
    </div>
    <div id="editor-area" style="display:none">
      <div class="editor-section">
        <div class="editor-label">시간</div>
        <div class="time-row">
          <input class="time-input" id="cue-start" placeholder="00:00.000" oninput="onTimeInput()">
          <span class="time-sep">→</span>
          <input class="time-input" id="cue-end" placeholder="00:00.000" oninput="onTimeInput()">
          <button class="time-now-btn" onclick="setStartNow()">시작=지금</button>
          <button class="time-now-btn" onclick="setEndNow()">종료=지금</button>
        </div>
      </div>
      <div class="editor-section">
        <div class="editor-label">자막 내용</div>
        <div class="toolbar">
          <button class="tb-btn" id="tb-bold" onclick="applyFormat('bold')" title="굵게 (선택 영역)"><b>B</b></button>
          <div class="tb-sep"></div>
          <span style="font-size:.72rem;color:#666;align-self:center;margin-right:2px">색:</span>
          <div class="color-swatch" style="background:#ff4444" onclick="applyColor('#ff4444')" title="빨강"></div>
          <div class="color-swatch" style="background:#44aaff" onclick="applyColor('#44aaff')" title="파랑"></div>
          <div class="color-swatch" style="background:#44ee88" onclick="applyColor('#44ee88')" title="초록"></div>
          <div class="color-swatch" style="background:#ffdd44" onclick="applyColor('#ffdd44')" title="노랑"></div>
          <div class="color-swatch" style="background:#ff88ee" onclick="applyColor('#ff88ee')" title="분홍"></div>
          <div class="color-swatch" style="background:#ffffff" onclick="applyColor('#ffffff')" title="흰색"></div>
          <div class="tb-sep"></div>
          <button class="tb-btn" onclick="removeFormat()" title="서식 제거" style="font-size:.7rem">✕서식</button>
        </div>
        <div class="cue-editor" id="cue-editor" contenteditable="true"
             oninput="onEditorInput()" onkeydown="onEditorKey(event)"></div>
        <div style="font-size:.7rem;color:#444;margin-top:4px">선택 후 서식 버튼 클릭 · Enter로 줄바꿈</div>
      </div>
      <div class="editor-section">
        <div class="editor-label">미리보기</div>
        <div class="preview-box" id="cue-preview"></div>
      </div>
    </div>
  </div>
</div>

<!-- 내보내기 모달 -->
<div class="overlay" id="export-modal">
  <div class="modal">
    <h3>💾 자막 내보내기</h3>
    <div class="modal-btns">
      <button class="m-btn" onclick="exportVTT()">
        📄 VTT 파일로 저장
        <span class="m-btn-sub">WebVTT 형식 (.vtt) — 별도 파일로 다운로드</span>
      </button>
      <button class="m-btn" onclick="exportSRT()">
        📄 SRT 파일로 저장
        <span class="m-btn-sub">SubRip 형식 (.srt) — 별도 파일로 다운로드</span>
      </button>
      <button class="m-btn" onclick="burnSubtitles('replace')">
        🎬 MP4에 직접 삽입 (원본 교체)
        <span class="m-btn-sub">ffmpeg로 자막 트랙 삽입 · 원본 파일 덮어쓰기</span>
      </button>
      <button class="m-btn" onclick="burnSubtitles('new')">
        🎬 MP4에 직접 삽입 (새 파일)
        <span class="m-btn-sub">ffmpeg로 자막 트랙 삽입 · _sub.mp4 파일 생성</span>
      </button>
    </div>
    <button class="modal-cancel" onclick="closeExport()">취소</button>
  </div>
</div>

<script>
const PI_URL  = localStorage.getItem('MPL_URL') || '';
const UID     = localStorage.getItem('MPL_USER') || '';
const NGROK_H = { 'ngrok-skip-browser-warning': 'true' };

const params  = new URLSearchParams(location.search);
const FILE_PATH = params.get('path') || '';
const FILE_NAME = params.get('name') || '영상';

if (!PI_URL || !UID || !FILE_PATH) { alert('잘못된 접근입니다.'); history.back(); }

document.getElementById('fname-label').textContent = FILE_NAME;
document.title = FILE_NAME + ' — 자막 에디터';

// ── 자막 데이터 ──────────────────────────────────────────────
// cue: { id, start(sec), end(sec), html(contenteditable innerHTML) }
let cues = [];
let selectedIdx = -1;
const AUTOSAVE_KEY = 'subtitle_as_' + btoa(FILE_PATH).replace(/=/g,'');
const AUTOSAVE_TTL = 7 * 24 * 60 * 60 * 1000; // 7일

// ── 자동저장 ─────────────────────────────────────────────────
function autosave() {
  const data = { cues, ts: Date.now() };
  localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(data));
  const el = document.getElementById('autosave-label');
  el.textContent = '● 저장됨 ' + new Date().toLocaleTimeString('ko');
  el.style.color = '#4ade80';
  setTimeout(() => { el.style.color = '#555'; el.textContent = '●'; }, 2000);
}
let autosaveTimer = null;
function scheduleAutosave() {
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(autosave, 1500);
}
function loadAutosave() {
  // 만료된 항목 정리
  for (const k of Object.keys(localStorage)) {
    if (!k.startsWith('subtitle_as_')) continue;
    try {
      const d = JSON.parse(localStorage.getItem(k));
      if (!d || Date.now() - d.ts > AUTOSAVE_TTL) localStorage.removeItem(k);
    } catch { localStorage.removeItem(k); }
  }
  const saved = localStorage.getItem(AUTOSAVE_KEY);
  if (!saved) return false;
  try {
    const d = JSON.parse(saved);
    if (!d || !d.cues) return false;
    cues = d.cues;
    renderCueList();
    showToast('자동저장 데이터를 불러왔습니다.');
    return true;
  } catch { return false; }
}

// ── 영상 로드 ─────────────────────────────────────────────────
const video = document.getElementById('preview-video');
video.src = PI_URL + '/api/webhard/file?uid=' + UID + '&path=' + encodeURIComponent(FILE_PATH);
video.addEventListener('timeupdate', onVideoTime);

// ── 자막 오버레이 실시간 렌더 ────────────────────────────────
function onVideoTime() {
  const t = video.currentTime;
  const overlay = document.getElementById('vtt-overlay');
  const active = cues.filter(c => t >= c.start && t <= c.end);
  overlay.innerHTML = active.map(c => htmlToOverlay(c.html)).join('<br>');
}
function htmlToOverlay(html) {
  // contenteditable HTML → 오버레이 표시용 (그대로 사용, 색상 span 포함)
  return html.replace(/\n/g, '<br>');
}

// ── 자막 목록 렌더 ────────────────────────────────────────────
function renderCueList() {
  const list = document.getElementById('cue-list');
  document.getElementById('cue-count').textContent = cues.length;
  if (!cues.length) {
    list.innerHTML = '<div class="empty-cue">자막이 없습니다</div>';
    return;
  }
  list.innerHTML = cues.map((c, i) => `
    <div class="cue-row${selectedIdx === i ? ' active' : ''}" onclick="selectCue(${i})">
      <span class="cue-time">${fmtTime(c.start)} → ${fmtTime(c.end)}</span>
      <span class="cue-text">${stripTags(c.html) || '(빈 자막)'}</span>
      <button class="cue-del" onclick="event.stopPropagation();deleteCue(${i})">✕</button>
    </div>`).join('');
}

// ── 자막 선택/추가/삭제 ───────────────────────────────────────
function selectCue(i) {
  selectedIdx = i;
  renderCueList();
  const c = cues[i];
  document.getElementById('no-selection').style.display = 'none';
  document.getElementById('editor-area').style.display = 'block';
  document.getElementById('cue-start').value = fmtTime(c.start);
  document.getElementById('cue-end').value = fmtTime(c.end);
  document.getElementById('cue-editor').innerHTML = c.html;
  updatePreview();
}

function addCueAtCurrent() {
  const t = video.currentTime;
  const newCue = { id: Date.now(), start: Math.max(0, t), end: Math.max(0, t) + 3, html: '' };
  // 시간순 삽입
  const insertAt = cues.findIndex(c => c.start > newCue.start);
  if (insertAt < 0) cues.push(newCue);
  else cues.splice(insertAt, 0, newCue);
  const idx = cues.findIndex(c => c.id === newCue.id);
  renderCueList();
  selectCue(idx);
  scheduleAutosave();
  document.getElementById('cue-editor').focus();
}

function deleteCue(i) {
  cues.splice(i, 1);
  if (selectedIdx === i) {
    selectedIdx = -1;
    document.getElementById('no-selection').style.display = 'block';
    document.getElementById('editor-area').style.display = 'none';
  } else if (selectedIdx > i) selectedIdx--;
  renderCueList();
  scheduleAutosave();
}

// ── 시간 입력 ─────────────────────────────────────────────────
function onTimeInput() {
  if (selectedIdx < 0) return;
  const s = parsetime(document.getElementById('cue-start').value);
  const e = parsetime(document.getElementById('cue-end').value);
  if (s !== null) cues[selectedIdx].start = s;
  if (e !== null) cues[selectedIdx].end   = e;
  renderCueList();
  scheduleAutosave();
}
function setStartNow() {
  if (selectedIdx < 0) return;
  const t = video.currentTime;
  cues[selectedIdx].start = t;
  document.getElementById('cue-start').value = fmtTime(t);
  renderCueList(); scheduleAutosave();
}
function setEndNow() {
  if (selectedIdx < 0) return;
  const t = video.currentTime;
  cues[selectedIdx].end = t;
  document.getElementById('cue-end').value = fmtTime(t);
  renderCueList(); scheduleAutosave();
}

// ── 에디터 입력 ───────────────────────────────────────────────
function onEditorInput() {
  if (selectedIdx < 0) return;
  cues[selectedIdx].html = document.getElementById('cue-editor').innerHTML;
  updatePreview();
  const row = document.querySelector('.cue-row.active .cue-text');
  if (row) row.textContent = stripTags(cues[selectedIdx].html) || '(빈 자막)';
  scheduleAutosave();
}
function onEditorKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); document.execCommand('insertLineBreak'); }
}
function updatePreview() {
  if (selectedIdx < 0) return;
  document.getElementById('cue-preview').innerHTML = cues[selectedIdx].html || '<span style="color:#444">미리보기</span>';
}

// ── 서식 (선택 영역에 적용) ────────────────────────────────────
function applyFormat(cmd) {
  document.getElementById('cue-editor').focus();
  if (cmd === 'bold') document.execCommand('bold');
  onEditorInput();
}
function applyColor(color) {
  document.getElementById('cue-editor').focus();
  document.execCommand('foreColor', false, color);
  onEditorInput();
}
function removeFormat() {
  document.getElementById('cue-editor').focus();
  document.execCommand('removeFormat');
  onEditorInput();
}

// ── VTT 생성 ──────────────────────────────────────────────────
function htmlToVttText(html) {
  // contenteditable HTML → VTT 큐 텍스트 변환
  return html
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<b>(.*?)<\/b>/gi, '<b>$1</b>')
    .replace(/<span[^>]+color:\s*([^;"]+)[^>]*>(.*?)<\/span>/gi, (_, color, content) => {
      const hex = color.trim().replace(/\s/g,'');
      return `<c.${hex.replace('#','c')}>${content}</c>`;
    })
    .replace(/<[^>]+>/g, '')
    .trim();
}
function fmtVTTTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = (sec % 60).toFixed(3).padStart(6, '0');
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${s}`;
}
function buildVTT() {
  let vtt = 'WEBVTT\n\n';
  const sorted = [...cues].sort((a, b) => a.start - b.start);
  sorted.forEach((c, i) => {
    vtt += `${i + 1}\n`;
    vtt += `${fmtVTTTime(c.start)} --> ${fmtVTTTime(c.end)}\n`;
    vtt += htmlToVttText(c.html) + '\n\n';
  });
  return vtt;
}
function buildSRT() {
  let srt = '';
  const sorted = [...cues].sort((a, b) => a.start - b.start);
  sorted.forEach((c, i) => {
    srt += `${i + 1}\n`;
    srt += `${fmtSRTTime(c.start)} --> ${fmtSRTTime(c.end)}\n`;
    srt += htmlToSrtText(c.html) + '\n\n';
  });
  return srt;
}
function fmtSRTTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  const ms = Math.round((sec % 1) * 1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
}
function htmlToSrtText(html) {
  return html
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<b>(.*?)<\/b>/gi, '<b>$1</b>')
    .replace(/<span[^>]+color:\s*([^;"]+)[^>]*>(.*?)<\/span>/gi, '<font color="$1">$2</font>')
    .replace(/<(?!\/?(b|font)\b)[^>]+>/gi, '')
    .trim();
}

// ── 내보내기 ──────────────────────────────────────────────────
function openExport()  { if (!cues.length) { alert('자막이 없습니다.'); return; } document.getElementById('export-modal').classList.add('open'); }
function closeExport() { document.getElementById('export-modal').classList.remove('open'); }

function downloadBlob(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function exportVTT() {
  closeExport();
  downloadBlob(buildVTT(), FILE_NAME.replace(/\.mp4$/i,'') + '.vtt', 'text/vtt');
}
function exportSRT() {
  closeExport();
  downloadBlob(buildSRT(), FILE_NAME.replace(/\.mp4$/i,'') + '.srt', 'text/plain');
}
async function burnSubtitles(mode) {
  closeExport();
  showToast('자막 삽입 중... (시간이 걸릴 수 있습니다)');
  try {
    const res = await fetch(PI_URL + '/api/subtitle/burn', {
      method: 'POST',
      headers: { ...NGROK_H, 'Content-Type': 'application/json' },
      body: JSON.stringify({ uid: UID, path: FILE_PATH, vtt: buildVTT(), mode })
    });
    const d = await res.json();
    if (d.success) showToast('✅ 자막이 삽입되었습니다. (' + (mode === 'replace' ? '원본 교체' : '새 파일 생성') + ')');
    else alert('오류: ' + (d.error || '실패'));
  } catch(e) { alert('네트워크 오류: ' + e.message); }
}

// ── 유틸 ──────────────────────────────────────────────────────
function fmtTime(sec) {
  if (isNaN(sec)) return '00:00.000';
  const m = Math.floor(sec / 60);
  const s = (sec % 60).toFixed(3).padStart(6,'0');
  return `${String(m).padStart(2,'0')}:${s}`;
}
function parsetime(str) {
  // HH:MM:SS.mmm or MM:SS.mmm or SS.mmm
  if (!str) return null;
  str = str.trim();
  const parts = str.split(':').map(Number);
  if (parts.some(isNaN)) return null;
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if (parts.length === 2) return parts[0]*60 + parts[1];
  return parts[0];
}
function stripTags(html) { return (html||'').replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').trim(); }

let toastTimer;
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #7c3aed;color:#eee;padding:8px 18px;border-radius:20px;font-size:.82rem;z-index:999;transition:.2s';
    document.body.appendChild(t); }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

// ── 초기화 ────────────────────────────────────────────────────
loadAutosave();
renderCueList();
</script>
