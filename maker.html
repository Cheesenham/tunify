<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL Pro - Pi Maker v3 (Playlist & SC)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ef4444; --bg: #0f172a; --sc: #ff5500; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; padding: 20px; }
        h1 { grid-column: span 2; margin-bottom: 20px; font-weight: 800; font-size: 2.5rem; text-align: center; }
        h1 span { color: var(--primary); }
        
        .box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; height: 500px; }
        h3 { margin-top: 0; color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .search-opts { display: flex; gap: 10px; margin-bottom: 10px; }
        .opt-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #333; background: none; color: #777; cursor: pointer; font-size: 0.8rem; }
        .opt-btn.active { border-color: var(--primary); color: white; background: rgba(239, 68, 68, 0.2); }
        .opt-btn.active.sc { border-color: var(--sc); background: rgba(255, 85, 0, 0.2); }

        .search-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; }

        .results-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        .item { padding: 12px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.02); transition: 0.2s; border: 1px solid transparent; position: relative; }
        .item:hover { background: rgba(255,255,255,0.08); }
        .item.selected { border-color: var(--primary); background: rgba(239, 68, 68, 0.1); }
        .item img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        .playlist-badge { position: absolute; top:5px; right:5px; background:var(--primary); font-size:0.6rem; padding:2px 6px; border-radius:10px; }

        #lyric-preview { background: #000; border-radius: 12px; padding: 15px; font-family: monospace; font-size: 0.85rem; color: #888; height: 100%; overflow-y: auto; }
        .extract-footer { grid-column: span 2; padding: 25px; background: var(--primary); color: white; border-radius: 20px; text-align: center; cursor: pointer; font-weight: 800; font-size: 1.4rem; margin-top: 20px; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Pi <span>Maker v3</span></h1>

        <div class="box">
            <h3>1. Search Music Library</h3>
            <div class="search-opts">
                <button id="p-yt" class="opt-btn active" onclick="setPlatform('yt')">YouTube</button>
                <button id="p-sc" class="opt-btn" onclick="setPlatform('sc')">SoundCloud</button>
                <div style="width: 20px;"></div>
                <button id="t-video" class="opt-btn active" onclick="setType('video')">Single</button>
                <button id="t-playlist" class="opt-btn" onclick="setType('playlist')">Playlist</button>
            </div>
            <div class="search-row">
                <input type="text" id="musicQuery" placeholder="Search anything...">
                <button onclick="searchMusic()">Search</button>
            </div>
            <div id="music-results" class="results-list"></div>
        </div>

        <div class="box">
            <h3>2. Sync Lyrics (Manual Selection)</h3>
            <div class="search-row">
                <input type="text" id="lyricQuery" placeholder="Artist - Song Title">
                <button onclick="searchLyrics()" style="background: #3b82f6;">Search Sync</button>
            </div>
            <div id="lyric-preview" class="results-list"></div>
        </div>

        <div id="extract-btn" class="extract-footer" onclick="startExtraction()">
            🚀 GENERATE SELECTION
        </div>
    </div>

    <script>
        const PI_URL = localStorage.getItem('MPL_URL');
        const UID = localStorage.getItem('MPL_USER');
        let selectedMusic = null;
        let selectedLyrics = null;
        let currentPlatform = 'yt';
        let currentType = 'video';

        function setPlatform(p) {
            currentPlatform = p;
            document.querySelectorAll('.opt-btn[id^="p-"]').forEach(b => b.classList.remove('active'));
            document.getElementById(`p-${p}`).classList.add('active');
        }
        function setType(t) {
            currentType = t;
            document.querySelectorAll('.opt-btn[id^="t-"]').forEach(b => b.classList.remove('active'));
            document.getElementById(`t-${t}`).classList.add('active');
        }

        async function searchMusic() {
            const q = document.getElementById('musicQuery').value;
            const resBox = document.getElementById('music-results');
            resBox.innerHTML = "<div style='text-align:center;'>Searching...</div>";
            const r = await fetch(`${PI_URL}/api/search`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ query: q, platform: currentPlatform, type: currentType })
            });
            const data = await r.json();
            resBox.innerHTML = data.results.map(f => `
                <div class="item" onclick='selectMusic(this, ${JSON.stringify(f)})'>
                    <img src="${f.thumbnail}">
                    <div class="item-info">
                        <div style="font-weight:700; font-size:0.85rem;">${f.title}</div>
                        ${f.is_playlist ? `<span class="playlist-badge">PLAYLIST (${f.count})</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function selectMusic(el, item) {
            selectedMusic = item;
            document.querySelectorAll('.item').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function searchLyrics() {
            const q = document.getElementById('lyricQuery').value;
            const preBox = document.getElementById('lyric-preview');
            preBox.innerHTML = "Searching...";
            const r = await fetch(`${PI_URL}/api/lyrics/search`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ query: q })
            });
            const data = await r.json();
            if(data.success) {
                selectedLyrics = data.lyrics;
                preBox.innerHTML = data.lyrics.map(l => `<div><b>[${l.time.toFixed(1)}s]</b> ${l.text}</div>`).join('');
            } else {
                preBox.innerHTML = "Not Found.";
            }
        }

        async function startExtraction() {
            if(!selectedMusic) return alert("Select music!");
            const btn = document.getElementById('extract-btn');
            btn.style.opacity = "0.5"; btn.innerText = "Raspberry Pi Working...";
            const r = await fetch(`${PI_URL}/api/extract`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    url: selectedMusic.url,
                    artist: document.getElementById('lyricQuery').value.split('-')[0].trim(),
                    selected_lyrics: selectedLyrics,
                    uid: UID
                })
            });
            alert("Task Started! Check library in a few minutes.");
            btn.style.opacity = "1"; btn.innerText = "🚀 GENERATE SELECTION";
        }
    </script>
</body>
</html>
