<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL Pro - Pi Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ef4444; --bg: #0f172a; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 12px; }
        select, input { padding: 12px; background: none; border: none; color: white; font-size: 1rem; }
        input { flex: 1; outline: none; }
        button { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .item { background: #1e293b; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .item img { width: 100px; height: 100px; border-radius: 10px; object-fit: cover; }
        .item-info { flex: 1; overflow: hidden; }
        .item-title { font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-meta { font-size: 0.8rem; opacity: 0.5; }
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        .btn-mini { padding: 6px 12px; font-size: 0.7rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: none; color: white; cursor: pointer; }
        .btn-mini:hover { background: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="margin-bottom:20px;">🎬 Pi <span>Maker</span></h1>
        <div class="search-box">
            <select id="source">
                <option value="yt">YouTube</option>
                <option value="sc">SoundCloud</option>
            </select>
            <input type="text" id="query" placeholder="Search keywords or paste URL...">
            <button onclick="search()">Search</button>
        </div>
        <div id="results">검색 결과를 입력하세요.</div>
    </div>

    <script>
        const PI_URL = localStorage.getItem('MPL_URL');
        const USER_ID = localStorage.getItem('MPL_USER');

        async function search() {
            const query = document.getElementById('query').value;
            const source = document.getElementById('source').value;
            if(!query) return;
            
            const list = document.getElementById('results');
            list.innerText = "라즈베리파이에서 검색 중...";

            try {
                const r = await fetch(`${PI_URL}/api/search`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ query, source })
                });
                const res = await r.json();
                if(!res.success) throw new Error(res.msg);
                
                list.innerHTML = res.results.map(f => `
                    <div class="item">
                        <img src="${f.thumbnail}" alt="thumb">
                        <div class="item-info">
                            <div class="item-title">${f.title}</div>
                            <div class="item-meta">${f.uploader}</div>
                        </div>
                        <div class="btn-group">
                            <button class="btn-mini" onclick="extract('${f.url}', 'music')">🎵 Music</button>
                            <button class="btn-mini" onclick="extract('${f.url}', 'video')">📽️ Video</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { alert("연결 실패: " + e.message); }
        }

        async function extract(url, mode) {
            alert("라즈베리파이에 추출을 요청했습니다. 라이브러리를 확인하세요.");
            await fetch(`${PI_URL}/api/extract`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url, mode, uid: USER_ID })
            });
        }
    </script>
</body>
</html>
