<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL Pro - Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sc-orange: #ff5500;
            --sc-bg: #1a1a1a;
            --sc-surface: #222;
            --sc-border: #2a2a2a;
            --sc-muted: #999;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--sc-bg); color: white; min-height: 100vh; display: flex; flex-direction: column; }

        /* Top nav */
        .topnav { height: 52px; background: #111; border-bottom: 1px solid var(--sc-border); display: flex; align-items: center; padding: 0 24px; gap: 16px; flex-shrink: 0; }
        .topnav .logo { font-size: 1.1rem; font-weight: 700; color: var(--sc-orange); }
        .topnav .logo span { color: white; font-weight: 400; }
        .topnav a { color: var(--sc-muted); text-decoration: none; font-size: 0.82rem; margin-left: auto; }
        .topnav a:hover { color: white; }
        .conn-badge { font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
        .conn-badge.err { background: rgba(239,68,68,0.1); color: #ef4444; border-color: rgba(239,68,68,0.2); }

        /* Layout */
        .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px; flex: 1; display: flex; flex-direction: column; gap: 16px; }
        .panels { display: grid; grid-template-columns: 1.15fr 1fr; gap: 16px; }

        /* Panel */
        .panel { background: var(--sc-surface); border: 1px solid var(--sc-border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
        .panel-header { padding: 16px 18px 0; }
        .panel-title { font-size: 0.95rem; font-weight: 600; color: #ddd; margin-bottom: 14px; }
        .panel-body { padding: 0 18px 18px; flex: 1; display: flex; flex-direction: column; }

        /* Source tabs */
        .source-tabs { display: flex; border-bottom: 1px solid var(--sc-border); margin-bottom: 14px; }
        .source-tab { padding: 8px 14px; cursor: pointer; font-size: 0.82rem; font-weight: 500; color: var(--sc-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: 0.15s; }
        .source-tab:hover { color: #ccc; }
        .source-tab.active { color: var(--sc-orange); border-bottom-color: var(--sc-orange); }

        /* Pills */
        .pill-group { margin-bottom: 12px; }
        .pill-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 7px; }
        .pills { display: flex; gap: 6px; flex-wrap: wrap; }
        .pill { padding: 5px 13px; border-radius: 20px; border: 1px solid #333; background: none; color: var(--sc-muted); font-size: 0.77rem; font-weight: 500; cursor: pointer; transition: 0.12s; font-family: inherit; }
        .pill:hover { border-color: #555; color: #ccc; }
        .pill.active { border-color: var(--sc-orange); color: white; background: rgba(255,85,0,0.14); }

        /* Search */
        .search-row { display: flex; gap: 8px; margin-bottom: 14px; margin-top: 4px; }
        .s-input { flex: 1; padding: 9px 13px; background: #111; border: 1px solid var(--sc-border); border-radius: 6px; color: white; outline: none; font-size: 0.85rem; font-family: inherit; }
        .s-input:focus { border-color: var(--sc-orange); }
        .s-btn { padding: 9px 16px; background: var(--sc-orange); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.82rem; font-family: inherit; transition: 0.12s; white-space: nowrap; }
        .s-btn:hover { background: #e04d00; }
        .s-btn.blue { background: #3b82f6; }
        .s-btn.blue:hover { background: #2563eb; }

        /* Results */
        .results { flex: 1; overflow-y: auto; min-height: 300px; max-height: 360px; }
        .result-item { display: flex; align-items: center; gap: 11px; padding: 9px 8px; border-radius: 6px; cursor: pointer; transition: 0.12s; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .result-item:hover { background: rgba(255,255,255,0.04); }
        .result-item.selected { background: rgba(255,85,0,0.09); border-left: 3px solid var(--sc-orange); padding-left: 6px; }
        .result-thumb { width: 42px; height: 42px; border-radius: 4px; object-fit: cover; background: #333; flex-shrink: 0; }
        .result-info { min-width: 0; flex: 1; }
        .result-title { font-size: 0.84rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .result-sub { font-size: 0.72rem; color: var(--sc-muted); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
        .badge { display: inline-block; background: rgba(255,85,0,0.18); color: var(--sc-orange); font-size: 0.63rem; padding: 1px 6px; border-radius: 3px; font-weight: 600; }

        /* Lyric rows */
        .lyric-row { padding: 5px 0; font-size: 0.8rem; color: #666; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; gap: 10px; }
        .lyric-row .ts { color: var(--sc-orange); font-family: monospace; font-size: 0.72rem; flex-shrink: 0; }
        .lyric-row .txt { color: #bbb; }

        /* Status bar */
        .status-bar { display: flex; align-items: center; gap: 10px; padding: 11px 16px; background: var(--sc-surface); border: 1px solid var(--sc-border); border-radius: 8px; font-size: 0.8rem; color: var(--sc-muted); }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #444; flex-shrink: 0; transition: 0.3s; }

        /* Generate button */
        .gen-wrap { margin-top: 4px; }
        .gen-btn { width: 100%; padding: 16px; background: var(--sc-orange); color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; font-family: inherit; letter-spacing: 0.3px; transition: 0.15s; }
        .gen-btn:hover:not(:disabled) { background: #e04d00; transform: translateY(-1px); }
        .gen-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
        .gen-btn.success { background: #16a34a; }

        /* Placeholder text */
        .placeholder { padding: 40px 20px; text-align: center; color: #444; font-size: 0.82rem; }

        /* 작업 큐 */
        #queue-wrap { margin-top: 4px; }
        .job-item { background: var(--sc-surface); border: 1px solid var(--sc-border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .job-thumb { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; background: #333; flex-shrink: 0; }
        .job-info { flex: 1; min-width: 0; }
        .job-title { font-size: 0.84rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
        .job-status { font-size: 0.72rem; color: var(--sc-muted); margin-bottom: 5px; }
        .progress-bar-bg { width: 100%; height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--sc-orange); border-radius: 2px; transition: width 0.4s ease; }
        .progress-bar-fill.done { background: #4ade80; }
        .progress-bar-fill.fail { background: #ef4444; }
        .job-pct { font-size: 0.72rem; color: var(--sc-muted); min-width: 34px; text-align: right; flex-shrink: 0; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body>
    <nav class="topnav">
        <div class="logo">MPL <span>Maker</span></div>
        <span id="conn-badge" class="conn-badge" style="background:rgba(255,255,255,0.05); color:#555; border-color:#333;">Connecting...</span>
        <a href="/">← Home</a>
    </nav>

    <div class="wrap">
        <!-- Status -->
        <div class="status-bar">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Connecting to Pi server...</span>
            <span style="margin-left:auto; font-size:0.72rem; color:#444;" id="current-url"></span>
        </div>

        <!-- Panels -->
        <div class="panels">
            <!-- Panel 1: Source -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">1. Select Source</div>
                    <div class="source-tabs">
                        <div class="source-tab active" id="tab-yt" onclick="setPlatform('yt')">YouTube</div>
                        <div class="source-tab" id="tab-sc" onclick="setPlatform('sc')">SoundCloud</div>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="pill-group">
                        <div class="pill-label">Format</div>
                        <div class="pills">
                            <button id="m-music" class="pill active" onclick="setMode('music')">MP3 Audio</button>
                            <button id="m-video" class="pill" onclick="setMode('video')">MP4 Video</button>
                        </div>
                    </div>
                    <div class="pill-group">
                        <div class="pill-label">Type</div>
                        <div class="pills">
                            <button id="t-video" class="pill active" onclick="setType('video')">Single</button>
                            <button id="t-playlist" class="pill" onclick="setType('playlist')">Playlist</button>
                        </div>
                    </div>
                    <div class="search-row">
                        <input type="text" id="musicQuery" class="s-input" placeholder="Keywords or URL..." onkeydown="if(event.key==='Enter') searchMusic()">
                        <button class="s-btn" onclick="searchMusic()">Search</button>
                    </div>
                    <div id="music-results" class="results">
                        <div class="placeholder">Search for a track to get started</div>
                    </div>
                </div>
            </div>

            <!-- Panel 2: Lyrics -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">2. Lyrics</div>
                    <div class="pills" style="margin-bottom:12px;">
                        <button id="lm-skip" class="pill active" onclick="setLyricsMode('skip')">건너뛰기</button>
                        <button id="lm-auto" class="pill" onclick="setLyricsMode('auto')">자동 검색</button>
                        <button id="lm-manual" class="pill" onclick="setLyricsMode('manual')">직접 선택</button>
                    </div>
                </div>
                <div class="panel-body">
                    <div id="lyrics-manual-area">
                        <div class="search-row" style="margin-top:0;">
                            <input type="text" id="lyricQuery" class="s-input" placeholder="Artist - Title" onkeydown="if(event.key==='Enter') searchLyrics()">
                            <button class="s-btn blue" onclick="searchLyrics()">Find</button>
                        </div>
                        <div id="lyric-preview" class="results">
                            <div class="placeholder">Select a track first, or search manually</div>
                        </div>
                    </div>
                    <div id="lyrics-auto-area" style="display:none; padding:20px; text-align:center; color:#555; font-size:0.85rem;">
                        다운로드 후 곡명으로 자동 검색합니다.<br>
                        <span style="font-size:0.75rem; color:#444;">가사가 없으면 건너뜁니다.</span>
                    </div>
                    <div id="lyrics-skip-area" style="display:none; padding:20px; text-align:center; color:#555; font-size:0.85rem;">
                        가사 없이 다운로드합니다.
                    </div>
                </div>
            </div>
        </div>

        <!-- Generate -->
        <div class="gen-wrap">
            <button id="extract-btn" class="gen-btn" onclick="startExtraction()">
                Generate Track
            </button>
        </div>

        <!-- 작업 큐 -->
        <div id="queue-wrap" style="display:none;">
            <div style="font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; color:#555; margin-bottom:10px;">신청 목록</div>
            <div id="queue-list"></div>
        </div>
    </div>

    <script>
        const NGROK_HEADERS = { 'ngrok-skip-browser-warning': 'true', 'Content-Type': 'application/json' };
        function apiFetch(url, opts = {}) {
            return fetch(url, { ...opts, headers: { ...NGROK_HEADERS, ...(opts.headers || {}) } });
        }

        let PI_URL = localStorage.getItem('MPL_URL');
        if (!PI_URL) {
            PI_URL = prompt("Pi Server Address (e.g. https://xxx.trycloudflare.com)");
            if (PI_URL) localStorage.setItem('MPL_URL', PI_URL);
        }
        if (PI_URL && PI_URL.endsWith('/')) PI_URL = PI_URL.slice(0, -1);
        document.getElementById('current-url').innerText = PI_URL || '';

        const UID = localStorage.getItem('MPL_USER') || 'admin';
        let selectedMusic = null, selectedLyrics = null, currentPlaylistUrl = '';
        let currentPlatform = 'yt', currentMode = 'music', currentType = 'video', lyricsMode = 'skip';

        // Check connection
        (async () => {
            const badge = document.getElementById('conn-badge');
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            try {
                const r = await apiFetch(`${PI_URL}/api/status`, { signal: AbortSignal.timeout(5000) });
                const d = await r.json();
                dot.style.background = '#4ade80';
                badge.className = 'conn-badge';
                badge.innerText = 'Connected';
                text.innerText = (d.msg || 'Pi Online') + ' · ffmpeg: ' + (d.ffmpeg ? '✓' : '✗');
            } catch(e) {
                dot.style.background = '#ef4444';
                badge.className = 'conn-badge err';
                badge.innerText = 'Offline';
                text.innerText = 'Cannot connect to ' + PI_URL;
            }
        })();

        function setPlatform(p) {
            currentPlatform = p;
            document.querySelectorAll('.source-tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + p).classList.add('active');
        }

        function setMode(m) {
            currentMode = m;
            document.querySelectorAll('[id^="m-"]').forEach(el => el.classList.remove('active'));
            document.getElementById('m-' + m).classList.add('active');
        }

        function setType(t) {
            currentType = t;
            document.querySelectorAll('[id^="t-"]').forEach(el => el.classList.remove('active'));
            document.getElementById('t-' + t).classList.add('active');
        }

        function setLyricsMode(m) {
            lyricsMode = m;
            document.querySelectorAll('[id^="lm-"]').forEach(el => el.classList.remove('active'));
            document.getElementById('lm-' + m).classList.add('active');
            document.getElementById('lyrics-manual-area').style.display = m === 'manual' ? 'flex' : 'none';
            document.getElementById('lyrics-manual-area').style.flexDirection = 'column';
            document.getElementById('lyrics-auto-area').style.display = m === 'auto' ? 'block' : 'none';
            document.getElementById('lyrics-skip-area').style.display = m === 'skip' ? 'block' : 'none';
        }
        setLyricsMode('skip');

        async function searchMusic() {
            const q = document.getElementById('musicQuery').value.trim();
            if (!q) return;
            const box = document.getElementById('music-results');
            box.innerHTML = '<div class="placeholder">Searching...</div>';
            try {
                const r = await apiFetch(`${PI_URL}/api/search`, {
                    method: 'POST',
                    body: JSON.stringify({ query: q, platform: currentPlatform, type: currentType })
                });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const data = await r.json();
                if (!data.results?.length) { box.innerHTML = '<div class="placeholder">No results found</div>'; return; }

                // SoundCloud 플리: YouTube 변환 다운로드
                const isSCPlaylist = data.playlist_title && q.includes('soundcloud.com');
                if (isSCPlaylist) {
                    currentPlaylistUrl = q;
                    box.innerHTML = `<div style="padding:14px 8px;">
                        <div style="font-size:0.72rem;color:#666;text-transform:uppercase;letter-spacing:1px;">SoundCloud Playlist</div>
                        <div style="font-size:0.95rem;font-weight:700;margin:4px 0;">${data.playlist_title}</div>
                        <div style="font-size:0.72rem;color:#555;margin-bottom:12px;">${data.results.length}곡 감지됨</div>
                        <div style="font-size:0.78rem;color:#888;margin-bottom:10px;">SoundCloud 직접 다운로드 불가 — 각 곡을 YouTube에서 자동 검색해 다운로드합니다.</div>
                        <button class="s-btn" style="width:100%;padding:10px;" onclick="downloadSCAsYT()">YouTube로 변환 후 전체 다운로드 (${data.results.length}곡)</button>
                    </div>`;
                    return;
                }

                currentPlaylistUrl = data.playlist_title ? q : '';
                const header = data.playlist_title
                    ? `<div style="padding:8px 4px 10px;border-bottom:1px solid #2a2a2a;margin-bottom:8px;">
                         <div style="font-size:0.72rem;color:#666;text-transform:uppercase;letter-spacing:1px;">Playlist</div>
                         <div style="font-size:0.95rem;font-weight:700;margin-top:3px;">${data.playlist_title}</div>
                         <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
                           <span style="font-size:0.72rem;color:#555;">${data.results.length}곡</span>
                           <button class="s-btn" style="padding:5px 14px;font-size:0.78rem;" onclick="downloadAll()">전체 다운로드</button>
                         </div>
                       </div>` : '';
                box.innerHTML = header + data.results.map(f => `
                    <div class="result-item" onclick='selectMusic(this, ${JSON.stringify(f).replace(/'/g,"&#39;")})'>
                        <img class="result-thumb" src="${f.thumbnail || ''}" onerror="this.style.background='#444'; this.src=''">
                        <div class="result-info">
                            <div class="result-title">${f.title}</div>
                            <div class="result-sub">
                                <span>${f.uploader || ''}</span>
                                ${f.is_playlist ? '<span class="badge">PLAYLIST</span>' : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                box.innerHTML = `<div class="placeholder" style="color:#ef4444;">Connection failed<br><small style="color:#666;">${e.message}</small></div>`;
            }
        }

        function selectMusic(el, item) {
            selectedMusic = item;
            document.querySelectorAll('.result-item').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
            const lq = document.getElementById('lyricQuery');
            if (!lq.value && item.title) lq.value = item.title;
        }

        async function searchLyrics() {
            const q = document.getElementById('lyricQuery').value.trim();
            if (!q) return;
            const box = document.getElementById('lyric-preview');
            box.innerHTML = '<div class="placeholder">Searching lyrics...</div>';
            try {
                const r = await apiFetch(`${PI_URL}/api/lyrics/search`, {
                    method: 'POST',
                    body: JSON.stringify({ query: q })
                });
                const d = await r.json();
                if (d.success && d.lyrics?.length) {
                    selectedLyrics = d.lyrics;
                    box.innerHTML = d.lyrics.map(l => `
                        <div class="lyric-row">
                            <span class="ts">${l.time.toFixed(1)}s</span>
                            <span class="txt">${l.text}</span>
                        </div>
                    `).join('');
                } else {
                    box.innerHTML = '<div class="placeholder">No synced lyrics found</div>';
                }
            } catch(e) {
                box.innerHTML = '<div class="placeholder">Could not fetch lyrics</div>';
            }
        }

        async function _doExtract(url, extraOpts = {}) {
            const r = await apiFetch(`${PI_URL}/api/extract`, {
                method: 'POST',
                body: JSON.stringify({
                    url,
                    mode: currentMode,
                    uid: UID,
                    auto_lyrics: lyricsMode === 'auto',
                    selected_lyrics: lyricsMode === 'manual' ? selectedLyrics : null,
                    artist: lyricsMode === 'manual' ? document.getElementById('lyricQuery').value.split('-')[0].trim() : '',
                    ...extraOpts
                })
            });
            return r.json();
        }

        async function downloadSCAsYT() {
            if (!currentPlaylistUrl) return;
            const btn = event.currentTarget;
            btn.disabled = true; btn.innerText = '변환 중...';
            try {
                const r = await apiFetch(`${PI_URL}/api/extract`, {
                    method: 'POST',
                    body: JSON.stringify({
                        url: currentPlaylistUrl, mode: currentMode, uid: UID,
                        auto_lyrics: lyricsMode === 'auto', convert_sc: true
                    })
                });
                const d = await r.json();
                btn.innerText = `${d.count}곡 YouTube 다운로드 중`;
                document.getElementById('queue-wrap').style.display = 'block';
                startPolling();
            } catch(e) { btn.disabled = false; btn.innerText = '다시 시도'; alert(e.message); }
        }

        async function downloadAll() {
            if (!currentPlaylistUrl) return;
            const btn = event.currentTarget;
            btn.disabled = true; btn.innerText = '요청 중...';
            try {
                const d = await _doExtract(currentPlaylistUrl);
                btn.innerText = `${d.count}곡 추출 중`;
                document.getElementById('queue-wrap').style.display = 'block';
                startPolling();
            } catch(e) { btn.disabled = false; btn.innerText = '전체 다운로드'; alert(e.message); }
        }

        async function startExtraction() {
            if (!selectedMusic) { alert('먼저 트랙을 선택하세요.'); return; }
            const btn = document.getElementById('extract-btn');
            btn.disabled = true; btn.innerText = '요청 중...';
            try {
                const d = await _doExtract(selectedMusic.url);
                btn.disabled = false;
                btn.innerText = d.count > 1 ? `${d.count}곡 추출 중` : 'Generate Track';
                if (d.count > 1) setTimeout(() => { btn.innerText = 'Generate Track'; }, 3000);
                document.getElementById('queue-wrap').style.display = 'block';
                startPolling();
            } catch(e) {
                btn.disabled = false; btn.innerText = 'Generate Track';
                alert('Error: ' + e.message);
            }
        }

        let pollTimer = null;
        function startPolling() {
            if (pollTimer) return;
            pollTimer = setInterval(pollJobs, 2000);
            pollJobs();
        }

        async function pollJobs() {
            try {
                const r = await apiFetch(`${PI_URL}/api/jobs`);
                const d = await r.json();
                renderQueue(d.jobs || {});
                // 모두 완료/실패면 폴링 느리게
                const active = Object.values(d.jobs || {}).filter(j => j.progress < 100 && !j.error);
                if (active.length === 0) {
                    clearInterval(pollTimer);
                    pollTimer = null;
                }
            } catch(e) {}
        }

        function renderQueue(jobs) {
            const list = document.getElementById('queue-list');
            const entries = Object.entries(jobs).reverse();
            if (!entries.length) return;
            list.innerHTML = entries.map(([id, j]) => {
                const isDone = j.progress === 100;
                const isFail = !!j.error;
                const fillClass = isDone ? 'done' : isFail ? 'fail' : '';
                const pct = isFail ? 0 : j.progress;
                return `
                    <div class="job-item">
                        <img class="job-thumb" src="${j.thumbnail || ''}" onerror="this.style.background='#444'">
                        <div class="job-info">
                            <div class="job-title">${j.title}</div>
                            <div class="job-status">${j.status}</div>
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill ${fillClass}" style="width:${pct}%"></div>
                            </div>
                        </div>
                        <div class="job-pct">${isDone ? '✓' : isFail ? '✗' : pct + '%'}</div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
